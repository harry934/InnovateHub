    <style>
      /* Login Page Specific Styles */

      /* Full-height container */
      .login-container {
        min-height: 100vh;
        background: var(--bs-light);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        position: relative;
      }

      .back-home {
        position: absolute;
        top: 1rem;
        left: 1rem;
        color: #1a5e4f;
        text-decoration: none;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.3s ease;
        z-index: 10;
      }

      .back-home:hover {
        color: #14493e;
        transform: translateX(-5px);
      }

      /* Uiverse.io Form Styles */
      .form {
        display: flex;
        flex-direction: column;
        gap: 10px;
        background-color: #ffffff;
        padding: 30px;
        width: 450px;
        border-radius: 20px;
        font-family: 'Open Sans', sans-serif;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        animation: fadeInUp 0.6s ease;
      }

      ::placeholder {
        font-family: 'Open Sans', sans-serif;
      }

      .form button {
        align-self: flex-end;
      }

      .flex-column > label {
        color: #151717;
        font-weight: 600;
        margin-bottom: 5px;
        display: block;
      }

      .inputForm {
        border: 1.5px solid #ecedec;
        border-radius: 10px;
        height: 50px;
        display: flex;
        align-items: center;
        padding-left: 10px;
        transition: 0.2s ease-in-out;
        margin-bottom: 10px;
      }

      .input {
        margin-left: 10px;
        border-radius: 10px;
        border: none;
        width: 85%;
        height: 100%;
        background: transparent;
      }

      .input:focus {
        outline: none;
      }

      .inputForm:focus-within {
        border: 1.5px solid #2d79f3;
      }

      .flex-row {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 10px;
        justify-content: space-between;
        margin-bottom: 15px;
      }

      .flex-row > div > label {
        font-size: 14px;
        color: black;
        font-weight: 400;
        margin-bottom: 0;
      }

      .span {
        font-size: 14px;
        margin-left: 5px;
        color: #2d79f3;
        font-weight: 500;
        cursor: pointer;
      }

      .button-submit {
        margin: 20px 0 10px 0;
        background-color: #1a5e4f; /* Using Brand Green */
        border: none;
        color: white;
        font-size: 15px;
        font-weight: 500;
        border-radius: 10px;
        height: 50px;
        width: 100% !important;
        cursor: pointer;
        transition: 0.3s;
      }

      .button-submit:hover {
        background-color: #14493e;
        transform: translateY(-2px);
      }

      .p {
        text-align: center;
        color: black;
        font-size: 14px;
        margin: 5px 0;
      }

      .btn {
        margin-top: 10px;
        width: 100% !important;
        height: 50px;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: 500;
        gap: 10px;
        border: 1px solid #ededef;
        background-color: white;
        cursor: pointer;
        transition: 0.2s ease-in-out;
      }

      .btn:hover {
        border: 1px solid #2d79f3;
        background-color: #f8f9fa;
      }

      .line {
        position: relative;
        margin: 20px 0;
      }

      .line::before,
      .line::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 35%;
        height: 1px;
        background: #ecedec;
      }

      .line::before { left: 0; }
      .line::after { right: 0; }

      @media (max-width: 768px) {
        .form {
          width: 90%;
        }
        .back-home {
          position: static;
          margin-bottom: 1rem;
        }
        .login-container {
          flex-direction: column;
          padding-top: 5rem;
        }
      }

    <!-- Mobile Hamburger Menu Enhancement Script -->
    <script>
    (function() {
        document.addEventListener('DOMContentLoaded', function() {
            var navCollapse = document.getElementById('navbarCollapse');
            var toggler = document.querySelector('.navbar-toggler');
            if (!navCollapse || !toggler) return;

            // Inject custom 3-bar icon into toggler
            if (!toggler.querySelector('.mob-icon')) {
                var icon = document.createElement('span');
                icon.className = 'mob-icon';
                icon.innerHTML = '<span></span><span></span><span></span>';
                toggler.appendChild(icon);
            }

            // Inject overlay div
            var overlay = document.getElementById('mobileNavOverlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'mobileNavOverlay';
                overlay.className = 'mobile-nav-overlay';
                document.body.appendChild(overlay);
            }

            // Bootstrap events
            navCollapse.addEventListener('show.bs.collapse', function() {
                document.body.classList.add('mob-menu-open');
                overlay.classList.add('active');
            });

            navCollapse.addEventListener('hide.bs.collapse', function() {
                document.body.classList.remove('mob-menu-open');
                overlay.classList.remove('active');
            });

            // Click overlay to close
            overlay.addEventListener('click', function() {
                var bsCollapse = bootstrap.Collapse.getInstance(navCollapse);
                if (bsCollapse) bsCollapse.hide();
                else new bootstrap.Collapse(navCollapse).hide();
            });
        });
    })();
    </script>

    <!-- Login Logic -->
    <script type="module">
      import { auth, googleProvider, db } from "./js/firebase-config.js";
      import {
        signInWithEmailAndPassword,
        signInWithPopup,
        signOut,
        sendPasswordResetEmail,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
      import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      // Check for URL parameters to pre-fill email
      window.addEventListener("load", function () {
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get("role");
        if (role === "admin") {
          document.getElementById("email").value = "admin@innovatehub.com";
        }
      });

      async function handleSuccessfulLogin(user) {
        try {
          // Fetch user data from Firestore
          const userDoc = await getDoc(doc(db, "users", user.uid));
          
          let userData = {
            uid: user.uid,
            email: user.email,
            displayName: user.displayName || user.email.split('@')[0],
            role: 'innovator' // default
          };
          
          if (userDoc && userDoc.exists()) {
            userData = { ...userData, ...userDoc.data() };
          }
          
          // Store user data in localStorage
          localStorage.setItem('innovateHubUser', JSON.stringify(userData));
          localStorage.setItem('justLoggedIn', 'true');
          
          // Always redirect to homepage
          return "index.html";
        } catch (err) {
          console.error("Error in handleSuccessfulLogin:", err);
          // Still redirect to homepage even on error
          localStorage.setItem('justLoggedIn', 'true');
          return "index.html";
        }
      }

      window.handleGoogleLogin = async function () {
        if (window.location.protocol === "file:") {
          showErrorMessage("Google login requires a web server.");
          return;
        }

        try {
          const result = await signInWithPopup(auth, googleProvider);
          const user = result.user;
          
          showSuccessMessage("Login successful! Redirecting to homepage...");
          const redirectUrl = await handleSuccessfulLogin(user);
          console.log("Google Login Success, redirecting to:", redirectUrl);
          setTimeout(() => (window.location.href = redirectUrl), 1000);
        } catch (error) {
          console.error("Google Login Error:", error);
          showErrorMessage("Google authentication failed: " + error.message);
        }
      };

      window.handleLogin = async function (event) {
        event.preventDefault();

        const email = document.getElementById("email").value.toLowerCase();
        const password = document.getElementById("password").value;

        if (!email || !password) {
          showErrorMessage("Please enter both email and password");
          return;
        }

        const btn = document.querySelector(".button-submit");
        const originalText = btn.innerHTML;
        btn.innerHTML =
          '<i class="fa fa-spinner fa-spin me-2"></i> Verifying...';
        btn.disabled = true;

        try {
          const userCredential = await signInWithEmailAndPassword(
            auth,
            email,
            password,
          );
          const user = userCredential.user;
          
          showSuccessMessage("Login successful! Redirecting to homepage...");
          const redirectUrl = await handleSuccessfulLogin(user);
          console.log("Email Login Success, redirecting to:", redirectUrl);
          setTimeout(() => (window.location.href = redirectUrl), 1000);
        } catch (error) {
          console.error("Login error:", error);
          let message = "Incorrect email or password.";
          if (error.code === "auth/user-not-found")
            message = "No account found with this email.";
          if (error.code === "auth/wrong-password")
            message = "Incorrect password.";

          showErrorMessage(message);
          btn.innerHTML = originalText;
          btn.disabled = false;
        }
      };

      window.handleForgotPassword = async function () {
        const email = document.getElementById("email").value;
        if (!email) {
          showErrorMessage("Please enter your email address first.");
          return;
        }

        if (confirm(`Send password reset link to ${email}?`)) {
          try {
            await sendPasswordResetEmail(auth, email);
            showSuccessMessage(
              "Password reset email sent! Please check your inbox.",
            );
          } catch (error) {
            console.error("Password reset error:", error);
            showErrorMessage("Failed to send reset email: " + error.message);
          }
        }
      };
    </script>
