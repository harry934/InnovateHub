<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Page Title -->
    <title>Login - Innovate Hub</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta content="innovation, login, student platform" name="keywords" />
    <meta
      content="Login to Innovate Hub to access your dashboard"
      name="description"
    />

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon" />

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@600;700&family=Open+Sans&display=swap"
      rel="stylesheet"
    />

    <!-- Icon Font Stylesheet -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Libraries Stylesheet -->
    <link href="lib/animate/animate.min.css" rel="stylesheet" />

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet" />

    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet" />

    <!-- Innovate Hub Custom Styles -->
    <link href="css/innovate-hub.css" rel="stylesheet" />

    <!-- Page-specific styles -->
    <style>
      /* Login Page Specific Styles */

      /* Full-height container */
      .login-container {
        min-height: 100vh;
        background: var(--bs-light);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      /* Login card - white box containing the form */
      .login-card {
        background: white;
        border-radius: 0; /* Sharp corners */
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); /* Neater shadow */
        max-width: 450px;
        width: 100%;
        padding: 3rem;
        animation: fadeInUp 0.6s ease;
        border: 1px solid #eee;
      }

      /* Logo section at top of card */
      .login-logo {
        text-align: center;
        margin-bottom: 2rem;
      }

      .login-logo img {
        width: 60px;
        height: 60px;
        margin-bottom: 1rem;
      }

      .login-logo h2 {
        color: #2c3e50;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }

      .login-logo p {
        color: #6c757d;
        font-size: 0.9rem;
      }

      /* Form group spacing */
      .form-group {
        margin-bottom: 1.5rem;
      }

      /* Form labels */
      .form-group label {
        font-weight: 600;
        color: #2c3e50;
        margin-bottom: 0.5rem;
        display: block;
      }

      /* Form inputs */
      .form-control,
      .form-select {
        padding: 0.75rem 1rem;
        border-radius: 0; /* Sharp corners */
        border: 2px solid #e9ecef;
        transition: all 0.3s ease;
      }

      /* Input focus state */
      .form-control:focus,
      .form-select:focus {
        border-color: #1a5e4f;
        box-shadow: 0 0 0 0.2rem rgba(26, 94, 79, 0.15);
      }

      .btn-login {
        width: 100%;
        padding: 0.75rem;
        background: #f3a813; /* Brand Orange */
        border: none;
        border-radius: 0; /* Sharp corners */
        color: black;
        font-weight: 700;
        font-size: 1.1rem;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .btn-login:hover {
        background: #d99611;
        transform: translateY(-2px);
      }

      /* Divider between form and links */
      .login-divider {
        text-align: center;
        margin: 2rem 0;
        color: #6c757d;
      }

      /* Links section */
      .login-links {
        text-align: center;
      }

      .login-links a {
        color: #1a5e4f;
        text-decoration: none;
        font-weight: 600;
      }

      .login-links a:hover {
        text-decoration: underline;
      }

      /* Back to home link */
      .login-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .back-home {
        position: absolute;
        top: 1rem;
        left: 1rem;
        color: #1a5e4f;
        text-decoration: none;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.3s ease;
        z-index: 10;
      }

      .back-home:hover {
        color: #14493e;
        transform: translateX(-5px);
      }

      /* Social Auth Buttons */
      .social-auth {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .btn-social {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 0.75rem;
        border: 2px solid #e9ecef;
        background: white;
        color: #495057;
        font-weight: 600;
        transition: all 0.3s ease;
        text-decoration: none;
        width: 100%;
      }

      .btn-social:hover {
        background: #f8f9fa;
        border-color: #dee2e6;
        color: #495057;
      }

      .btn-google img {
        width: 20px;
      }

      .divider-text {
        display: flex;
        align-items: center;
        text-align: center;
        margin-bottom: 1.5rem;
        color: #6c757d;
        font-size: 0.85rem;
      }

      .divider-text::before,
      .divider-text::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid #e9ecef;
      }

      .divider-text:not(:empty)::before {
        margin-right: 1rem;
      }

      .divider-text:not(:empty)::after {
        margin-left: 1rem;
      }

      @media (max-width: 768px) {
        .back-home {
          position: static;
          margin-bottom: 2rem;
        }
      }
    </style>
  </head>

  <body>
    <!-- Logo Preloader Start -->
    <div id="logo-preloader">
      <div class="preloader-content">
        <svg
          class="preloader-logo-svg"
          viewBox="0 0 40 40"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            class="hexagon-path"
            d="M20 4L33.8564 12V28L20 36L6.14359 28V12L20 4Z"
            stroke="white"
            stroke-width="2.5"
            stroke-linejoin="round"
          />
          <circle class="hub-circle" cx="20" cy="20" r="5" fill="#F3A813" />
          <line
            class="connect-line line-1"
            x1="20"
            y1="4"
            x2="20"
            y2="15"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
          />
          <line
            class="connect-line line-2"
            x1="33.8564"
            y1="28"
            x2="24.3301"
            y2="22.5"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
          />
          <line
            class="connect-line line-3"
            x1="6.14359"
            y1="28"
            x2="15.6699"
            y2="22.5"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
          />
        </svg>
      </div>
    </div>
    <!-- Logo Preloader End -->

    <!-- Login Page Container -->
    <div class="login-container">
      <!-- Back to Home Link (Top Left) -->
      <a href="/" class="back-home">
        <i class="fa fa-arrow-left"></i>
        Back to Home
      </a>

      <!-- Login Card (Centered) -->
      <div class="login-card">
        <!-- Logo and Title -->
        <div class="login-logo">
          <img src="img/logo-dark.svg" alt="Innovate Hub Logo" />
          <h2 style="color: #1a5e4f">Welcome Back!</h2>
          <p>Login to access your Innovate Hub dashboard</p>
        </div>

        <!-- Login Form -->
        <!-- onsubmit: JavaScript function called when form is submitted -->
        <!-- return false: Prevents default form submission (page reload) -->
        <form
          id="loginForm"
          onsubmit="
            handleLogin(event);
            return false;
          "
        >
          <div class="social-auth">
            <button
              type="button"
              class="btn btn-social btn-google"
              onclick="handleGoogleLogin()"
            >
              <img
                src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                alt="Google"
              />
              Continue with Google
            </button>
          </div>

          <div class="divider-text">OR EMAIL</div>

          <div class="alert alert-info py-2 small">
            <i class="fa fa-info-circle me-1"></i>
            <strong>Firebase Auth Mode:</strong>
            Use your registered email and password. Innovators and Mentors are
            redirected automatically.
          </div>

          <!-- Email Input -->
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="e.g. admin@innovate.com"
              required
            />
          </div>

          <!-- Password Input -->
          <div class="form-group">
            <label for="password">Password (Optional)</label>
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="..."
            />
          </div>

          <!-- Remember Me Checkbox -->
          <div class="form-group">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe" />
              <label class="form-check-label" for="rememberMe">
                Remember me
              </label>
            </div>
          </div>

          <button type="submit" class="btn btn-login mb-3">
            Login to Dashboard
          </button>

          <div class="text-center">
            <a
              href="javascript:void(0)"
              onclick="handleForgotPassword()"
              class="small text-muted text-decoration-none"
            >
              Forgot Password?
            </a>
          </div>
        </form>

        <!-- (Divider and Links remain unchanged) -->
        <div class="login-divider">
          <span>Don't have an account?</span>
        </div>

        <div class="login-links">
          <a href="/signup">Create an Account</a>
        </div>
      </div>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Innovate Hub JavaScript -->
    <script src="js/api.js"></script>
    <script type="module" src="js/innovate-hub.js"></script>

    <!-- Login Logic -->
    <script type="module">
      import { auth, googleProvider } from "./js/firebase-config.js";
      import {
        signInWithEmailAndPassword,
        signInWithPopup,
        signOut,
        sendPasswordResetEmail,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

      // Check for URL parameters to pre-fill email
      window.addEventListener("load", function () {
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get("role");
        if (role === "admin") {
          document.getElementById("email").value = "admin@innovatehub.com";
        }
      });

      window.handleGoogleLogin = async function () {
        if (window.location.protocol === "file:") {
          showErrorMessage("Google login requires a web server.");
          return;
        }

        try {
          const result = await signInWithPopup(auth, googleProvider);
          const user = result.user;
          const idToken = await user.getIdToken();

          const loginResult = await window.api.login(user, idToken);

          if (loginResult.ok) {
            const userData = loginResult.data.user;
            saveToLocalStorage("innovateHubUser", {
              ...userData,
              loggedIn: true,
            });

            let redirectUrl = "innovator-dashboard.html";
            if (userData.role === "admin") redirectUrl = "admin-dashboard.html";
            else if (userData.role === "mentor")
              redirectUrl = "mentor-dashboard.html";

            showSuccessMessage("Login successful! Welcome back.");
            setTimeout(() => (window.location.href = redirectUrl), 1000);
          } else {
            // New logic: if user not found, redirect to signup with their info
            showErrorMessage("No account found. Redirecting to signup to complete your profile...");
            setTimeout(() => {
                window.location.href = `/signup?email=${encodeURIComponent(user.email)}&name=${encodeURIComponent(user.displayName || '')}`;
            }, 2000);
          }
        } catch (error) {
          console.error("Google Login Error:", error);
          showErrorMessage("Google authentication failed: " + error.message);
        }
      };

      window.handleLogin = async function (event) {
        event.preventDefault();

        const email = document.getElementById("email").value.toLowerCase();
        const password = document.getElementById("password").value;

        if (!email || !password) {
          showErrorMessage("Please enter both email and password");
          return;
        }

        const btn = document.querySelector(".btn-login");
        const originalText = btn.innerHTML;
        btn.innerHTML =
          '<i class="fa fa-spinner fa-spin me-2"></i> Verifying...';
        btn.disabled = true;

        try {
          const userCredential = await signInWithEmailAndPassword(
            auth,
            email,
            password,
          );
          const user = userCredential.user;
          const idToken = await user.getIdToken();

          const loginResult = await window.api.login(user, idToken);

          if (loginResult.ok) {
            const userData = loginResult.data.user;
            saveToLocalStorage("innovateHubUser", {
              ...userData,
              loggedIn: true,
            });

            let redirectUrl = "innovator-dashboard.html";
            if (userData.role === "admin") redirectUrl = "admin-dashboard.html";
            else if (userData.role === "mentor")
              redirectUrl = "mentor-dashboard.html";

            showSuccessMessage("Login successful! Welcome back.");
            setTimeout(() => (window.location.href = redirectUrl), 1000);
          } else {
            showErrorMessage(
              loginResult.data.msg || "User not found in data store",
            );
            await signOut(auth);
            btn.innerHTML = originalText;
            btn.disabled = false;
          }
        } catch (error) {
          console.error("Login error:", error);
          let message = "Incorrect email or password.";
          if (error.code === "auth/user-not-found")
            message = "No account found with this email.";
          if (error.code === "auth/wrong-password")
            message = "Incorrect password.";

          showErrorMessage(message);
          btn.innerHTML = originalText;
          btn.disabled = false;
        }
      };

      window.handleForgotPassword = async function () {
        const email = document.getElementById("email").value;
        if (!email) {
          showErrorMessage("Please enter your email address first.");
          return;
        }

        if (confirm(`Send password reset link to ${email}?`)) {
          try {
            await sendPasswordResetEmail(auth, email);
            showSuccessMessage(
              "Password reset email sent! Please check your inbox.",
            );
          } catch (error) {
            console.error("Password reset error:", error);
            showErrorMessage("Failed to send reset email: " + error.message);
          }
        }
      };
    </script>
  </body>
</html>
