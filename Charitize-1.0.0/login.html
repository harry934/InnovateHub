      .login-container {

        text-decoration: none;
        font-weight: 600;
        display: inline-flex;

      /* Uiverse.io Form Styles */

        flex-direction: column;

        font-weight: 600;
        margin-bottom: 5px;
        display: block;
      }

      .inputForm {
        border: 1.5px solid #ecedec;
        border-radius: 10px;
        height: 50px;
        display: flex;
        align-items: center;
        padding-left: 10px;
        transition: 0.2s ease-in-out;
        margin-bottom: 10px;
      }

      .input {
        margin-left: 10px;
        border-radius: 10px;
        border: none;
        width: 85%;
        height: 100%;
        background: transparent;
      }

      .input:focus {
        outline: none;
      }

      .inputForm:focus-within {
        border: 1.5px solid #2d79f3;
      }

      .flex-row {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 10px;
        justify-content: space-between;
        margin-bottom: 15px;
      }

      .flex-row > div > label {
        font-size: 14px;
        color: black;
        font-weight: 400;
        margin-bottom: 0;
      }

      .span {
        font-size: 14px;
        margin-left: 5px;
        color: #2d79f3;
        font-weight: 500;
        cursor: pointer;
      }

      .button-submit {
        margin: 20px 0 10px 0;
        background-color: #1a5e4f; /* Using Brand Green */
        border: none;
        color: white;
        font-size: 15px;
        font-weight: 500;
        border-radius: 10px;
        height: 50px;
        width: 100% !important;
        cursor: pointer;
        transition: 0.3s;
      }

      .button-submit:hover {
        background-color: #14493e;
        transform: translateY(-2px);
      }

      .p {
        text-align: center;
        color: black;
        font-size: 14px;
        margin: 5px 0;
      }

      .btn {
        margin-top: 10px;
        width: 100% !important;
        height: 50px;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: 500;
        gap: 10px;
        border: 1px solid #ededef;
        background-color: white;
        cursor: pointer;
        transition: 0.2s ease-in-out;
      }

      .btn:hover {
        border: 1px solid #2d79f3;
        background-color: #f8f9fa;
      }

      .line {
        position: relative;
        margin: 20px 0;
      }

      .line::before,
      .line::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 35%;
        height: 1px;
        background: #ecedec;
      }

      .line::before { left: 0; }
      .line::after { right: 0; }

          padding-top: 4rem;

          padding: 20px;

        .back-home {
          position: absolute;
          top: 1rem;
          left: 1rem;
          margin-bottom: 0;
        }

    <!-- Mobile Hamburger Menu Enhancement Script -->
    <script>
    (function() {
        document.addEventListener('DOMContentLoaded', function() {
            var navCollapse = document.getElementById('navbarCollapse');
            var toggler = document.querySelector('.navbar-toggler');
            if (!navCollapse || !toggler) return;

            // Inject custom 3-bar icon into toggler
            if (!toggler.querySelector('.mob-icon')) {
                var icon = document.createElement('span');
                icon.className = 'mob-icon';
                icon.innerHTML = '<span></span><span></span><span></span>';
                toggler.appendChild(icon);
            }

            // Inject overlay div
            var overlay = document.getElementById('mobileNavOverlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'mobileNavOverlay';
                overlay.className = 'mobile-nav-overlay';
                document.body.appendChild(overlay);
            }

            // Bootstrap events
            navCollapse.addEventListener('show.bs.collapse', function() {
                document.body.classList.add('mob-menu-open');
                overlay.classList.add('active');
            });

            navCollapse.addEventListener('hide.bs.collapse', function() {
                document.body.classList.remove('mob-menu-open');
                overlay.classList.remove('active');
            });

            // Click overlay to close
            overlay.addEventListener('click', function() {
                var bsCollapse = bootstrap.Collapse.getInstance(navCollapse);
                if (bsCollapse) bsCollapse.hide();
                else new bootstrap.Collapse(navCollapse).hide();
            });
        });
    })();
    </script>

    <!-- Login Logic — Supabase Auth -->
    <script type="module">
      import SupabaseService from "./assets/js/core/supabase-service.js";

      // Pre-fill admin email via URL param
      window.addEventListener("load", function () {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get("role") === "admin") {
          document.getElementById("email").value = "techeagle254@gmail.com";
        }

        // Handle OAuth callback — Supabase sets session in URL hash after Google redirect
        window.supabase.auth.onAuthStateChange(async (event, session) => {
          if ((event === 'SIGNED_IN' || event === 'INITIAL_SESSION') && session) {
            await handleSuccessfulLogin(session);
          }
        });
      });

      window.showErrorMessage = function (msg) {
        const existing = document.getElementById('loginErrorMsg');
        if (existing) existing.remove();
        const div = document.createElement('div');
        div.id = 'loginErrorMsg';
        div.className = 'alert alert-danger mt-3 py-3 small shadow-sm d-flex flex-column align-items-center text-center';
        
        // Add resend link if it's an email confirmation error
        if (msg.includes('confirm your email')) {
            div.innerHTML = `
                <div class="mb-2"><i class="fa fa-envelope-open me-2"></i><b>${msg}</b></div>
                <button class="btn btn-link btn-sm p-0 text-decoration-underline" onclick="window.handleResendConfirmation()" style="color: #842029; font-weight: 600;">
                    Click here to resend the confirmation email
                </button>
            `;
        } else {
            div.textContent = msg;
        }
        document.querySelector('.form').appendChild(div);
      };

      window.showSuccessMessage = function (msg) {
        console.log('Login success:', msg);
      };

      async function handleSuccessfulLogin(session) {
        const supabaseUser = session.user;
        try {
          let userData = {
            uid: supabaseUser.id,
            id: supabaseUser.id,
            email: supabaseUser.email,
            displayName: supabaseUser.user_metadata?.full_name || supabaseUser.email.split('@')[0],
            role: supabaseUser.user_metadata?.role || null
          };

          // Fetch full profile from profiles table
          if (window.SupabaseService) {
            try {
              const profile = await window.SupabaseService.getProfile(supabaseUser.id);
              if (profile) {
                userData = {
                  ...userData,
                  fullName: profile.full_name,
                  role: profile.role,
                  status: profile.status,
                  loggedIn: true,
                  ...profile
                };
              }
            } catch (sbErr) {
              console.error("Profile fetch error:", sbErr);
            }
          }

          localStorage.setItem('innovateHubUser', JSON.stringify(userData));
          localStorage.setItem('justLoggedIn', 'true');

          // Redirect to homepage (dashboard-router on index.html handles role-based routing)
          window.location.href = "index.html";
        } catch (err) {
          console.error("handleSuccessfulLogin error:", err);
          localStorage.setItem('justLoggedIn', 'true');
          window.location.href = "index.html";
        }
      }

      // Email/Password Login
      window.handleLogin = async function (event) {
        event.preventDefault();
        const email = document.getElementById("email").value.toLowerCase().trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
          showErrorMessage("Please enter both email and password.");
          return;
        }

        const btn = document.querySelector(".button-submit");
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fa fa-spinner fa-spin me-2"></i> Verifying...';
        btn.disabled = true;

        try {
          const { data, error } = await window.supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;

          await handleSuccessfulLogin(data.session);
        } catch (error) {
          console.error("Login error:", error);
          let message = "Incorrect email or password.";
          if (error.message?.includes('Invalid login credentials')) message = "Incorrect email or password.";
          if (error.message?.includes('Email not confirmed')) message = "Please confirm your email first.";
          showErrorMessage(message);
          btn.innerHTML = originalText;
          btn.disabled = false;
        }
      };

      // Google OAuth Login (redirect-based)
      window.handleGoogleLogin = async function () {
        if (window.location.protocol === "file:") {
          showErrorMessage("Google login requires a web server (not file://).");
          return;
        }
        try {
          const { error } = await window.supabase.auth.signInWithOAuth({
            provider: 'google',
            options: {
              redirectTo: window.location.origin + '/index.html'
            }
          });
          if (error) throw error;
          // Supabase redirects the browser — no further code runs here
        } catch (error) {
          console.error("Google Login Error:", error);
          showErrorMessage("Google authentication failed: " + error.message);
        }
      };

      // Password Reset
      window.handleForgotPassword = async function () {
        const email = document.getElementById("email").value.trim();
        if (!email) {
          showErrorMessage("Please enter your email address first.");
          return;
        }
        if (confirm(`Send password reset link to ${email}?`)) {
          try {
            const { error } = await window.supabase.auth.resetPasswordForEmail(email, {
              redirectTo: window.location.origin + '/login.html'
            });
            if (error) throw error;
            alert("Password reset email sent! Please check your inbox.");
          } catch (error) {
            console.error("Password reset error:", error);
            showErrorMessage("Failed to send reset email: " + error.message);
          }
        }
      };

      // Resend Confirmation
      window.handleResendConfirmation = async function () {
        const email = document.getElementById("email").value.trim();
        if (!email) {
            showErrorMessage("Please enter your email address first.");
            return;
        }
        
        const btn = document.querySelector("#loginErrorMsg button");
        if (btn) btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Sending...';

        try {
            const { error } = await window.supabase.auth.resend({
                type: 'signup',
                email: email,
                options: {
                    emailRedirectTo: window.location.origin + '/login.html'
                }
            });
            if (error) throw error;
            
            showSuccessNotification("Confirmation email resent! Please check your inbox (and spam folder).");
            const existing = document.getElementById('loginErrorMsg');
            if (existing) existing.remove();
        } catch (error) {
            console.error("Resend error:", error);
            showErrorMessage("Failed to resend: " + error.message);
        }
      };

      function showSuccessNotification(msg) {
        const div = document.createElement('div');
        div.className = 'alert alert-success mt-3 py-3 small shadow-sm text-center';
        div.innerHTML = `<i class="fa fa-check-circle me-2"></i> ${msg}`;
        document.querySelector('.form').appendChild(div);
        setTimeout(() => div.remove(), 8000);
      }
    </script>
