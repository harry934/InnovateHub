<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Admin Dashboard - Innovate Hub</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@600;700&family=Open+Sans&display=swap"
        rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet">
    
    <!-- Innovate Hub Custom Styles -->
    <link href="css/innovate-hub.css" rel="stylesheet">
</head>

<body>
    <!-- Dashboard Container -->
    <div class="dashboard-container">
        
        <!-- Sidebar Navigation -->
        <div class="dashboard-sidebar bg-dark">
             <a href="index.html" class="logo-container text-decoration-none px-4 mb-4 mt-3">
                <img src="img/logo.svg" alt="Logo" style="width: 30px; height: 30px;">
                <span class="logo-text" style="color: white; font-size: 1.3rem; margin-left: 10px;">Innovate Hub</span>
            </a>
            
            <h6 class="sidebar-heading px-4 mt-2 mb-1 text-uppercase small text-muted">Management</h6>
            <nav class="nav flex-column mb-3">
                <a class="nav-link active" href="#" onclick="showSection('overview'); return false;">System Overview</a>
                <a class="nav-link" href="#" onclick="showSection('approvals'); return false;">
                    Mentor Approvals <span class="badge bg-warning text-dark ms-2 badge-pill" id="pendingCount">0</span>
                </a>
                <a class="nav-link" href="#" onclick="showSection('users'); return false;">All Users</a>
            </nav>

            <h6 class="sidebar-heading px-4 mt-2 mb-1 text-uppercase small text-muted">Admin</h6>
            <nav class="nav flex-column mb-3">
                <a class="nav-link text-danger mt-2" href="#" onclick="logout(); return false;">Logout</a>
            </nav>
        </div>
        
        <!-- Main Content Area -->
        <div class="dashboard-main">
            
            <!-- Overview Section -->
            <div id="overviewSection" class="dashboard-section">
                <div class="dashboard-header">
                    <h2>System Overview</h2>
                    <p class="text-muted">Platform statistics and health</p>
                </div>
                
                <div class="row g-4">
                    <div class="col-md-4">
                        <div class="dashboard-card text-center text-primary">
                            <i class="fa fa-users fa-3x mb-3"></i>
                            <h3>142</h3>
                            <p class="text-muted">Total Users</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="dashboard-card text-center text-success">
                            <i class="fa fa-project-diagram fa-3x mb-3"></i>
                            <h3>56</h3>
                            <p class="text-muted">Active Projects</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="dashboard-card text-center text-warning">
                             <i class="fa fa-chalkboard-teacher fa-3x mb-3"></i>
                            <h3>12</h3>
                            <p class="text-muted">Pending Mentors</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Approvals Section -->
            <div id="approvalsSection" class="dashboard-section" style="display: none;">
                <div class="dashboard-header">
                    <h2>Mentor Approvals</h2>
                    <p class="text-muted">Review and approve mentor applications</p>
                </div>
                
                <div id="approvalsContainer">
                    <!-- Dynamic content will be loaded here -->
                    <div class="alert alert-info">Loading pending applications...</div>
                </div>
            </div>
            
            <!-- Other sections omitted for brevity in prototype -->
            
        </div>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/innovate-hub.js"></script>
    
    <script>
        window.addEventListener('load', function() {
            // Check Access
            const user = requireAuth();
            if (user.role !== 'admin') {
                alert('Access Denied');
                window.location.href = 'login.html';
                return;
            }
            
            loadPendingMentors();
        });
        
        function showSection(sectionName) {
            document.querySelectorAll('.dashboard-section').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            
            document.getElementById(sectionName + 'Section').style.display = 'block';
            if(event.target) event.target.classList.add('active');
        }
        
        function loadPendingMentors() {
            const container = document.getElementById('approvalsContainer');
            const pendingMentors = loadFromLocalStorage('pendingMentors') || [];
            
            document.getElementById('pendingCount').textContent = pendingMentors.length;
            
            if (pendingMentors.length === 0) {
                 container.innerHTML = `
                    <div class="dashboard-card text-center py-5">
                        <i class="fa fa-check-circle fa-4x text-success mb-3"></i>
                        <p class="text-muted fs-5">All caught up! No pending applications.</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            pendingMentors.forEach((mentor, index) => {
                html += `
                    <div class="dashboard-card mb-3">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h4 class="mb-1">${mentor.fullName}</h4>
                                <p class="text-primary mb-2">${mentor.jobTitle} at ${mentor.organization}</p>
                                <span class="badge bg-secondary mb-3">${mentor.expertise}</span>
                            </div>
                            <div class="text-end">
                                <small class="text-muted d-block">Applied: ${formatDate(new Date(mentor.submittedDate))}</small>
                            </div>
                        </div>
                        
                        <div class="bg-light p-3 rounded mb-3">
                            <p class="mb-1 fw-bold small text-muted">MOTIVATION</p>
                            <p class="mb-3 fst-italic">"${mentor.motivation}"</p>
                            <p class="mb-1 fw-bold small text-muted">APPROACH</p>
                            <p class="mb-0 fst-italic">"${mentor.approach}"</p>
                        </div>
                        
                        <div class="d-flex gap-2 justify-content-end">
                            <button class="btn btn-outline-danger" onclick="rejectMentor(${index})">Reject</button>
                            <button class="btn btn-success" onclick="approveMentor(${index})">Approve & Activate</button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function approveMentor(index) {
            let pendingMentors = loadFromLocalStorage('pendingMentors') || [];
            const mentor = pendingMentors[index];
            
            // In a real app, strict database updates. Here we just alert.
            alert(`Approved ${mentor.fullName}! They can now log in.`);
            
            // Remove from pending
            pendingMentors.splice(index, 1);
            saveToLocalStorage('pendingMentors', pendingMentors);
            
            loadPendingMentors();
        }
        
        function rejectMentor(index) {
            if(confirm('Are you sure you want to reject this application?')) {
                let pendingMentors = loadFromLocalStorage('pendingMentors') || [];
                pendingMentors.splice(index, 1);
                saveToLocalStorage('pendingMentors', pendingMentors);
                loadPendingMentors();
            }
        }
    </script>
</body>
</html>
