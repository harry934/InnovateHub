<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Admin Dashboard - Innovate Hub</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    
    <link href="img/favicon.ico" rel="icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@600;700&family=Open+Sans&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/innovate-hub.css" rel="stylesheet">
</head>

<body>
    <div class="dashboard-container">
        <div class="dashboard-sidebar">
             <a href="index.html" class="logo-container text-decoration-none">
                <span class="logo-text" style="color: white; font-size: 1.5rem;">Innovate Hub</span>
            </a>
            
            <h6 class="sidebar-heading px-4 mt-2 mb-1 text-uppercase small text-muted">Management</h6>
            <nav class="nav flex-column mb-3">
                <a class="nav-link active" href="#" onclick="showSection('adminOverview'); return false;">Overview</a>
                <a class="nav-link" href="#" onclick="showSection('users'); return false;">User Management</a>
                <a class="nav-link" href="#" onclick="showSection('projects'); return false;">All Projects</a>
            </nav>

            <h6 class="sidebar-heading px-4 mt-2 mb-1 text-uppercase small text-muted">Account</h6>
            <nav class="nav flex-column mb-3">
                 <a class="nav-link" href="#" onclick="showSection('notifications'); return false;">
                    Notifications
                </a>
                <a class="nav-link text-danger mt-2" href="#" onclick="logout(); return false;">Logout</a>
            </nav>
        </div>
        
        <div class="dashboard-main">
            <!-- Overview -->
            <div id="adminOverview" class="dashboard-section">
                <div class="dashboard-header">
                    <h2>Admin Overview</h2>
                    <p class="text-muted">System Statistics</p>
                </div>
                 <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="dashboard-card text-center mb-3">
                            <h3 class="display-4 fw-bold text-primary">12</h3>
                            <p class="text-muted">Total Users</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                         <div class="dashboard-card text-center mb-3">
                            <h3 class="display-4 fw-bold text-success">5</h3>
                            <p class="text-muted">Projects</p>
                        </div>
                    </div>
                 </div>
            </div>

            <!-- Users Section (Replaces 'View All Users' with Category Cards as per plan, or list) -->
            <div id="usersSection" class="dashboard-section" style="display: none;">
                <div class="dashboard-header">
                    <h2>User Management</h2>
                </div>
                <div class="dashboard-card">
                     <p class="text-muted">User list fetching from API...</p>
                </div>
            </div>
            
            <!-- Projects Section -->
             <div id="projectsSection" class="dashboard-section" style="display: none;">
                <div class="dashboard-header">
                    <h2>All Projects</h2>
                </div>
                 <div class="dashboard-card">
                     <p class="text-muted">Project list fetching from API...</p>
                </div>
            </div>

             <!-- Notifications Section -->
            <div id="notificationsSection" class="dashboard-section" style="display: none;">
                <div class="dashboard-header">
                    <h2>Notifications</h2>
                </div>
                 <div class="dashboard-card">
                     <p class="text-muted">No new notifications.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/innovate-hub.js"></script>
    <script>
        window.addEventListener('load', function() {
            const user = requireAuth();
            if (user.role !== 'admin') {
                 showErrorMessage('Access denied.');
                 setTimeout(() => window.location.href = 'login.html', 1500);
            }
        });

        function showSection(sectionName) {
            const sections = document.querySelectorAll('.dashboard-section');
            sections.forEach(s => s.style.display = 'none');
            
            const map = {
                'adminOverview': 'adminOverview',
                'users': 'usersSection',
                'projects': 'projectsSection',
                'notifications': 'notificationsSection'
            };
             const target = document.getElementById(map[sectionName] || sectionName);
            if (target) target.style.display = 'block';
            
             const navLinks = document.querySelectorAll('.dashboard-sidebar .nav-link');
             navLinks.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('onclick') && link.getAttribute('onclick').includes(sectionName)) {
                  link.classList.add('active');
                }
             });
        }
    </script>
</body>
</html>
