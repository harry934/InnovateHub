<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Setup - Innovate Hub</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="text-primary font-weight-bold">Admin Setup</h2>
                            <p class="text-muted">Create the platform administrator credentials</p>
                        </div>
                        <div id="setupAlert" class="alert d-none"></div>
                        <form id="adminSetupForm">
                            <div class="mb-3">
                                <label class="form-label">Admin Email</label>
                                <input type="email" id="adminEmail" class="form-control" placeholder="admin@innovatehub.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Temporary Password</label>
                                <input type="password" id="adminPassword" class="form-control" placeholder="StrongPassword123!" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Admin Full Name</label>
                                <input type="text" id="adminName" class="form-control" placeholder="Platform Admin" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 font-weight-bold">
                                <i class="fa fa-user-shield me-2"></i> CREATE ADMIN ACCOUNT
                            </button>
                        </form>
                    </div>
                </div>
                <div class="text-center mt-3 text-danger small">
                    <i class="fa fa-exclamation-triangle me-1"></i> WARNING: This page should be deleted immediately after use.
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        document.getElementById('adminSetupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const fullName = document.getElementById('adminName').value;
            const alert = document.getElementById('setupAlert');
            const btn = e.target.querySelector('button');

            btn.disabled = true;
            btn.innerHTML = '<i class="fa fa-spinner fa-spin me-2"></i> CREATING...';

            try {
                // 1. Create Auth User
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Create Firestore Profile with Admin Role
                await setDoc(doc(db, "users", user.uid), {
                    fullName: fullName,
                    email: email,
                    role: "admin",
                    status: "active",
                    createdAt: new Date().toISOString()
                });

                alert.className = "alert alert-success";
                alert.innerHTML = "✅ SUCCESS! Admin account created. Redirecting to login...";
                alert.classList.remove('d-none');

                setTimeout(() => window.location.href = 'login.html', 3000);

            } catch (error) {
                console.error(error);
                alert.className = "alert alert-danger";
                alert.innerHTML = "❌ FAILED: " + error.message;
                alert.classList.remove('d-none');
                btn.disabled = false;
                btn.innerHTML = '<i class="fa fa-user-shield me-2"></i> CREATE ADMIN ACCOUNT';
            }
        });
    </script>
</body>
</html>
