    <style>
        /* Sign Up Page Specific Styles - Stepper Implementation */
        
        .signup-container {
            min-height: 100vh;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .signup-card {
            background: white;
            border-radius: 0;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            max-width: 600px;
            width: 100%;
            padding: 3rem;
            animation: fadeInUp 0.6s ease;
            position: relative;
            border: 1px solid #eee;
        }
        
        /* Stepper Visuals */
        .stepper-wrapper {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3rem;
            position: relative;
        }
        
        .stepper-wrapper::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #e9ecef;
            z-index: 1;
        }
        
        .stepper-item {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 33.33%;
        }
        
        .step-counter {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e9ecef;
            color: #6c757d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-bottom: 8px;
            transition: all 0.3s ease;
            border: 2px solid #fff;
        }
        
        .step-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stepper-item.active .step-counter {
            background: #1A5E4F;
            color: white;
        }
        
        .stepper-item.active .step-name {
            color: #1A5E4F;
        }
        
        .stepper-item.completed .step-counter {
            background: #F3A813;
            color: black;
        }
        
        /* Form Steps */
        .form-step {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        
        .form-step.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 0.5rem;
            display: block;
        }
        
        .form-control, .form-select {
            border-radius: 0;
            border: 2px solid #e9ecef;
            padding: 0.75rem 1rem;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #1A5E4F;
            box-shadow: none;
        }
        
        /* Navigation Buttons */
        .step-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            gap: 1rem;
        }
        
        .btn-step {
            padding: 0.75rem 2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 0;
            transition: all 0.3s ease;
        }
        
        .btn-next {
            background: #F3A813;
            color: black;
            border: none;
            flex-grow: 1;
        }
        
        .btn-prev {
            background: #e9ecef;
            color: #495057;
            border: none;
        }
        
        .btn-next:hover {
            background: #d99611;
        }
        
        .btn-prev:hover {
            background: #dee2e6;
        }
        
        .back-home {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: #1A5E4F;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

        </a>
        
        <!-- Signup Card -->
        <div class="signup-card">
            <!-- Stepper Progress -->
            <div class="stepper-wrapper">
                <div class="stepper-item active" id="stepIndicator1">
                    <div class="step-counter">1</div>
                    <div class="step-name">Account</div>
                </div>
                <div class="stepper-item" id="stepIndicator2">
                    <div class="step-counter">2</div>
                    <div class="step-name">Profile</div>
                </div>
                <div class="stepper-item" id="stepIndicator3">
                    <div class="step-counter">3</div>
                    <div class="step-name">Project</div>
                </div>
            </div>
            
            <!-- Signup Form -->
            <form id="signupForm" onsubmit="return false;">
                
                <!-- Step 1: Account Information -->
                <div class="form-step active" id="step1">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" class="form-control" id="email" placeholder="email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" class="form-control" id="password" placeholder="Create a strong password" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat password" required>
                    </div>
                    <div class="step-buttons">

                    </div>

                <!-- Step 2: Personal & Professional Profile -->
                <div class="form-step" id="step2">

                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" class="form-control" id="phone" placeholder="+254 7XX XXX XXX" required>
                    </div>
                    <div class="form-group">
                        <label for="role">Primary Role</label>
                        <select class="form-control" id="role" required>

                            <option value="innovator">Student Innovator</option>
                            <option value="mentor">Professional Mentor</option>
                            <option value="researcher">Researcher</option>
                            <option value="partner">Corporate Partner</option>

    <!-- Signup Page JavaScript -->
    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let currentStep = 1;
        
        window.nextStep = function(step) {
            if (validateStep(step)) {
                document.getElementById(`step${step}`).classList.remove('active');
                document.getElementById(`stepIndicator${step}`).classList.add('completed');
                document.getElementById(`stepIndicator${step}`).classList.remove('active');
                
                currentStep = step + 1;
                document.getElementById(`step${currentStep}`).classList.add('active');
                document.getElementById(`stepIndicator${currentStep}`).classList.add('active');
            }
        }
        
        window.prevStep = function(step) {
            document.getElementById(`step${step}`).classList.remove('active');
            document.getElementById(`stepIndicator${step}`).classList.remove('active');
            
            currentStep = step - 1;
            document.getElementById(`step${currentStep}`).classList.add('active');
            document.getElementById(`stepIndicator${currentStep}`).classList.remove('completed');
            document.getElementById(`stepIndicator${currentStep}`).classList.add('active');
        }
        
        function validateStep(step) {
            const currentStepDiv = document.getElementById(`step${step}`);
            const inputs = currentStepDiv.querySelectorAll('input, select');
            let isValid = true;
            
            inputs.forEach(input => {
                if (!input.checkValidity()) {
                    input.reportValidity();
                    isValid = false;
                }
            });
            
            if (step === 1) {
                const password = document.getElementById('password').value;
                const confirm = document.getElementById('confirmPassword').value;
                if (password !== confirm) {
                    showErrorMessage('Passwords do not match');
                    isValid = false;
                }
            }
            
            return isValid;
        }
        
        window.handleSignup = async function() {
            if (validateStep(3)) {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const fullName = document.getElementById('fullName').value;
                const role = document.getElementById('role').value;
                const phone = document.getElementById('phone').value;
                const area = document.getElementById('targetArea').value;
                const project = document.getElementById('projectTitle').value;

                // Show loading state
                const btn = event.submitter || document.querySelector('#step3 .btn-next');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fa fa-spinner fa-spin me-2"></i> Creating Account...';
                btn.disabled = true;

                try {
                    // 1. Create user in Firebase Auth
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;

                    // 2. Create user document in Firestore
                    await setDoc(doc(db, "users", user.uid), {
                        uid: user.uid,
                        email: email,
                        fullName: fullName,
                        role: role, // 'innovator', 'mentor', etc.
                        phone: phone,
                        area: area,
                        project: project,
                        createdAt: new Date().toISOString()
                    });

                    // 3. Set immediate session for the fast-path
                    const sessionData = {
                        uid: user.uid,
                        email: email,
                        fullName: fullName,
                        role: role,
                        phone: phone,
                        area: area,
                        project: project,
                        loggedIn: true
                    };
                    saveToLocalStorage('innovateHubUser', sessionData);
                    
                    showSuccessMessage('Signup successful! Welcome to Innovate Hub.');
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);

                } catch (error) {
                    console.error("Signup error:", error);
                    showErrorMessage('Signup failed: ' + error.message);
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            }
        }
    </script>
