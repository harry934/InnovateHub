<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sign Up - Innovate Hub</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta
      content="innovation, signup, student platform, registration"
      name="keywords"
    />
    <meta
      content="Create an account on Innovate Hub to start your innovation journey"
      name="description"
    />

    <!-- Favicon -->
    <link href="assets/img/favicon.ico" rel="icon" />

    <!-- Role-Based Redirect Guard (Immunity for Admins) -->
    <script>
      (function() {
        try {
          const user = JSON.parse(localStorage.getItem("innovateHubUser"));
          if (user && user.role) {
            const role = user.role.toLowerCase();
            if (role === 'admin' && !window.location.pathname.includes('admin-dashboard.html')) {
              window.location.replace("admin-dashboard.html");
            }
          }
        } catch(e) {}
      })();
    </script>

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@600;700&family=Open+Sans&display=swap"
      rel="stylesheet"
    />

    <!-- Icon Font Stylesheet -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Libraries Stylesheet -->
    <link href="assets/lib/animate/animate.min.css" rel="stylesheet" />

    <!-- Customized Bootstrap Stylesheet -->
    <link href="assets/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Template Stylesheet -->
    <link href="assets/css/style.css?v=140.0.0" rel="stylesheet" />

    <!-- Innovate Hub Custom Styles -->
    <link href="assets/css/innovate-hub.css?v=140.0.0" rel="stylesheet" />

    <!-- Mobile Enhancement Styles -->
    <link href="assets/css/mobile-nav.css?v=140.0.0" rel="stylesheet" />

    <!-- Page-specific styles -->
    <style>
      /* Full-height container */
      .signup-container {
        min-height: 100vh;
        background: var(--bs-light);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        position: relative;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .signup-container.ready {
        opacity: 1;
      }
      .signup-loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .back-home {
        position: absolute;
        top: 1rem;
        left: 1rem;
        color: #1a5e4f;
        text-decoration: none;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.3s ease;
        z-index: 10;
      }

      .back-home:hover {
        color: #14493e;
        transform: translateX(-5px);
      }

      /* Uiverse.io Form Styles Adapted for Signup Card */
      .signup-card {
        display: flex;
        flex-direction: column;
        gap: 10px;
        background-color: #ffffff;
        padding: 40px;
        width: 100%;
        max-width: 550px;
        border-radius: 20px;
        font-family: "Open Sans", sans-serif;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        animation: fadeInUp 0.6s ease;
        border: 1px solid #eee;
      }

      /* Stepper Visuals - Modernized */
      .stepper-wrapper {
        display: flex;
        justify-content: space-between;
        margin-bottom: 2rem;
        position: relative;
      }

      .stepper-wrapper::before {
        content: "";
        position: absolute;
        top: 18px;
        left: 0;
        width: 100%;
        height: 2px;
        background: #ecedec;
        z-index: 1;
      }

      .stepper-item {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 33.33%;
      }

      .step-counter {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: white;
        color: #6c757d;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        margin-bottom: 8px;
        transition: all 0.3s ease;
        border: 2px solid #ecedec;
      }

      .step-name {
        font-size: 0.75rem;
        font-weight: 600;
        color: #6c757d;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .stepper-item.active .step-counter {
        border-color: #2d79f3;
        color: #2d79f3;
      }

      .stepper-item.active .step-name {
        color: #2d79f3;
      }

      .stepper-item.completed .step-counter {
        background: #2d79f3;
        color: white;
        border-color: #2d79f3;
      }

      /* Form Elements from Uiverse */
      .flex-column > label {
        color: #151717;
        font-weight: 600;
        margin-bottom: 5px;
        display: block;
      }

      .inputForm {
        border: 1.5px solid #ecedec;
        border-radius: 10px;
        height: 50px;
        display: flex;
        align-items: center;
        padding-left: 10px;
        transition: 0.2s ease-in-out;
        margin-bottom: 15px;
      }

      .input {
        margin-left: 10px;
        border-radius: 10px;
        border: none;
        width: 85%;
        height: 100%;
        background: transparent;
      }

      .input:focus {
        outline: none;
      }

      .inputForm:focus-within {
        border: 1.5px solid #2d79f3;
      }

      /* Custom Step Content */
      .form-step {
        display: none;
        animation: fadeIn 0.4s ease;
      }

      .form-step.active {
        display: block;
      }

      .button-submit {
        margin: 10px 0;
        background-color: #1a5e4f; /* Using Brand Green */
        border: none;
        color: white;
        font-size: 15px;
        font-weight: 500;
        border-radius: 10px;
        height: 50px;
        width: 100%;
        cursor: pointer;
        transition: 0.3s;
      }

      .button-submit:hover {
        background-color: #14493e;
        transform: translateY(-2px);
      }

      .btn-prev {
        background-color: #f8f9fa;
        color: #495057;
        border: 1.5px solid #ecedec;
      }

      .btn-prev:hover {
        background-color: #e9ecef;
      }

      .social-auth {
        display: flex;
        gap: 10px;
        margin-bottom: 1.5rem;
      }

      .btn-social {
        flex: 1;
        height: 50px;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: 500;
        gap: 10px;
        border: 1px solid #ededef;
        background-color: white;
        cursor: pointer;
        transition: 0.2s ease-in-out;
      }

      .btn-social:hover {
        border: 1px solid #2d79f3;
        background-color: #f8f9fa;
      }

      .divider-text {
        text-align: center;
        margin: 20px 0;
        position: relative;
        color: #6c757d;
        font-size: 0.85rem;
      }

      .divider-text::before,
      .divider-text::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 35%;
        height: 1px;
        background: #ecedec;
      }

      .divider-text::before {
        left: 0;
      }
      .divider-text::after {
        right: 0;
      }

      .p {
        text-align: center;
        color: black;
        font-size: 14px;
        margin: 5px 0;
      }

      .span {
        font-size: 14px;
        margin-left: 5px;
        color: #2d79f3;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 768px) {
        .signup-container {
          padding: 1rem;
          align-items: flex-start;
          padding-top: 4rem;
        }
        .signup-card {
          width: 100%;
          padding: 20px;
          margin-bottom: 2rem;
        }
        .stepper-wrapper {
          margin-bottom: 1.5rem;
        }
        .step-counter {
          width: 30px;
          height: 30px;
          font-size: 0.9rem;
        }
        .step-name {
          font-size: 0.65rem;
        }
        .back-home {
          position: absolute;
          top: 1rem;
          left: 1rem;
          margin-bottom: 0;
        }
      }
    </style>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/core/supabase-config.js?v=300.0.0"></script>
  </head>

  <body>

      <div class="preloader-content">
        <svg

    <!-- Loading Overlay -->
    <div id="signupLoading" class="signup-loading-overlay">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Sign Up Page Container -->
    <div class="signup-container" id="signupContainer">
      <!-- Back to Home Link (Top Left) -->
      <a href="/" class="back-home">
        <i class="fa fa-arrow-left"></i>
        Back to Home
      </a>

      <!-- Signup Card (Centered) -->
      <div class="signup-card">
        <!-- Stepper Progress -->
        <div class="stepper-wrapper">
          <div class="stepper-item active" id="stepIndicator1">
            <div class="step-counter">1</div>
            <div class="step-name">Account</div>
          </div>
          <div class="stepper-item" id="stepIndicator2">
            <div class="step-counter">2</div>
            <div class="step-name">Profile</div>
          </div>
          <div class="stepper-item" id="stepIndicator3">
            <div class="step-counter">3</div>
            <div class="step-name">Project</div>
          </div>
        </div>

        <!-- Redesigned Signup Form with Stepper Integration -->
        <form id="signupForm" onsubmit="return false;">
          <!-- Step 1: Account Information -->
          <div class="form-step active" id="step1">
            <div class="social-auth">
              <button
                type="button"
                class="btn-social"
                onclick="handleGoogleSignIn()"
              >
                <svg
                  version="1.1"
                  width="20"
                  id="Layer_1"
                  xmlns="http://www.w3.org/2000/svg"
                  xmlns:xlink="http://www.w3.org/1999/xlink"
                  x="0px"
                  y="0px"
                  viewBox="0 0 512 512"
                  style="enable-background: new 0 0 512 512"
                  xml:space="preserve"
                >
                  <path
                    style="fill: #fbbb00"
                    d="M113.47,309.408L95.648,375.94l-65.139,1.378C11.042,341.211,0,299.9,0,256c0-42.451,10.324-82.483,28.624-117.732h0.014l57.992,10.632l25.404,57.644c-5.317,15.501-8.215,32.141-8.215,49.456C103.821,274.792,107.225,292.797,113.47,309.408z"
                  ></path>
                  <path
                    style="fill: #518ef8"
                    d="M507.527,208.176C510.467,223.662,512,239.655,512,256c0,18.328-1.927,36.206-5.598,53.451c-12.462,58.683-45.025,109.925-90.134,146.187l-0.014-0.014l-73.044-3.727l-10.338-64.535c29.932-17.554,53.324-45.025,65.646-77.911h-136.89V208.176h138.887L507.527,208.176L507.527,208.176z"
                  ></path>
                  <path
                    style="fill: #28b446"
                    d="M416.253,455.624l0.014,0.014C372.396,490.901,316.666,512,256,512c-97.491,0-182.252-54.491-225.491-134.681l82.961-67.91c21.619,57.698,77.278,98.771,142.53,98.771c28.047,0,54.323-7.582,76.87-20.818L416.253,455.624z"
                  ></path>
                  <path
                    style="fill: #f14336"
                    d="M419.404,58.936l-82.933,67.896c-23.335-14.586-50.919-23.012-80.471-23.012c-66.729,0-123.429,42.957-143.965,102.724l-83.397-68.276h-0.014C71.23,56.123,157.06,0,256,0C318.115,0,375.068,22.126,419.404,58.936z"
                  ></path>
                </svg>
                Google
              </button>
              <button
                type="button"
                class="btn-social"
                onclick="showPhoneAuth()"
              >
                <i class="fa fa-phone text-success"></i>
                Phone
              </button>
            </div>

            <div class="divider-text">OR EMAIL</div>

            <div class="flex-column">
              <label for="email">Email Address</label>
            </div>
            <div class="inputForm">
              <svg
                height="20"
                viewBox="0 0 32 32"
                width="20"
                xmlns="http://www.w3.org/2000/svg"
              >
                <g id="Layer_3" data-name="Layer 3">
                  <path
                    d="m30.853 13.87a15 15 0 0 0 -29.729 4.082 15.1 15.1 0 0 0 12.876 12.918 15.6 15.6 0 0 0 2.016.13 14.85 14.85 0 0 0 7.715-2.145 1 1 0 1 0 -1.031-1.711 13.007 13.007 0 1 1 5.458-6.529 2.149 2.149 0 0 1 -4.158-.759v-10.856a1 1 0 0 0 -2 0v1.726a8 8 0 1 0 .2 10.325 4.135 4.135 0 0 0 7.83.274 15.2 15.2 0 0 0 .823-7.455zm-14.853 8.13a6 6 0 1 1 6-6 6.006 6.006 0 0 1 -6 6z"
                  ></path>
                </g>
              </svg>
              <input
                type="email"
                class="input"
                id="email"
                placeholder="email@example.com"
                required
              />
            </div>

            <div class="flex-column">
              <label for="password">Password</label>
            </div>
            <div class="inputForm">
              <svg
                height="20"
                viewBox="-64 0 512 512"
                width="20"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="m336 512h-288c-26.453125 0-48-21.523438-48-48v-224c0-26.476562 21.546875-48 48-48h288c26.453125 0 48 21.523438 48 48v224c0 26.476562-21.546875 48-48 48zm-288-288c-8.8125 0-16 7.167969-16 16v224c0 8.832031 7.1875 16 16 16h288c8.8125 0 16-7.167969 16-16v-224c0-8.832031-7.1875-16-16-16zm0 0"
                ></path>
                <path
                  d="m304 224c-8.832031 0-16-7.167969-16-16v-80c0-52.929688-43.070312-96-96-96s-96 43.070312-96 96v80c0 8.832031-7.167969 16-16 16s-16-7.167969-16-16v-80c0-70.59375 57.40625-128 128-128s128 57.40625 128 128v80c0 8.832031-7.167969 16-16 16zm0 0"
                ></path>
              </svg>
              <input
                type="password"
                class="input"
                id="password"
                placeholder="Create a strong password"
                required
                minlength="6"
              />
            </div>

            <div class="flex-column">
              <label for="confirmPassword">Confirm Password</label>
            </div>
            <div class="inputForm">
              <svg
                height="20"
                viewBox="-64 0 512 512"
                width="20"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="m336 512h-288c-26.453125 0-48-21.523438-48-48v-224c0-26.476562 21.546875-48 48-48h288c26.453125 0 48 21.523438 48 48v224c0 26.476562-21.546875 48-48 48zm-288-288c-8.8125 0-16 7.167969-16 16v224c0 8.832031 7.1875 16 16 16h288c8.8125 0 16-7.167969 16-16v-224c0-8.832031-7.1875-16-16-16zm0 0"
                ></path>
                <path
                  d="m304 224c-8.832031 0-16-7.167969-16-16v-80c0-52.929688-43.070312-96-96-96s-96 43.070312-96 96v80c0 8.832031-7.167969 16-16 16s-16-7.167969-16-16v-80c0-70.59375 57.40625-128 128-128s128 57.40625 128 128v80c0 8.832031-7.167969 16-16 16zm0 0"
                ></path>
              </svg>
              <input
                type="password"
                class="input"
                id="confirmPassword"
                placeholder="Repeat password"
                required
              />
            </div>

            <div class="step-buttons">
              <button type="button" class="button-submit" onclick="nextStep(1)">
                Next Step
              </button>
            </div>
          </div>

          <!-- Step 2: Personal & Professional Profile -->
          <div class="form-step" id="step2">
            <div class="flex-column">
              <label for="fullName">Full Name</label>
            </div>
            <div class="inputForm">
              <i class="fa fa-user opacity-50 ms-2"></i>
              <input
                type="text"
                class="input"
                id="fullName"
                placeholder="Enter your full name"
                required
              />
            </div>

            <div class="flex-column">
              <label for="phone">Phone Number</label>
            </div>
            <div class="inputForm">
              <i class="fa fa-phone opacity-50 ms-2"></i>
              <input
                type="tel"
                class="input"
                id="phone"
                placeholder="+254 7XX XXX XXX"
                required
              />
            </div>

            <div class="flex-column">
              <label for="role">Primary Role</label>
            </div>
            <div class="inputForm">
              <i class="fa fa-briefcase opacity-50 ms-2"></i>
              <select
                class="input"
                id="role"
                required
                onchange="toggleStep3Layout()"
              >
                <option value="" disabled selected>Select your role</option>
                <option value="innovator">Student Innovator</option>
                <option value="mentor">Professional Mentor</option>
              </select>
            </div>

            <div class="step-buttons" style="display: flex; gap: 10px">
              <button
                type="button"
                class="button-submit btn-prev"
                onclick="prevStep(2)"
              >
                Previous
              </button>
              <button type="button" class="button-submit" onclick="nextStep(2)">
                Next Step
              </button>
            </div>
          </div>

          <!-- Step 3: Role Specific Details -->
          <div class="form-step" id="step3">
            <!-- Innovator Layout -->
            <div id="innovatorFields" style="display: none">
              <h5 class="mb-3" style="color: #1a5e4f">Project Details</h5>
              <div class="flex-column">
                <label for="targetArea">Innovation Focus Area</label>
              </div>
              <div class="inputForm">
                <select class="input" id="targetArea">
                  <option value="" disabled selected>Select area</option>
                  <option value="agritech">Agricultural Technology</option>
                  <option value="robotics">Robotics & Automation</option>
                  <option value="ai">Artificial Intelligence</option>
                  <option value="digital">Digital Transformation</option>
                </select>
              </div>
              <div class="flex-column">
                <label for="projectTitle">Project Working Title</label>
              </div>
              <div class="inputForm">
                <input
                  type="text"
                  class="input"
                  id="projectTitle"
                  placeholder="e.g. Smart Irrigation System"
                />
              </div>
            </div>

            <!-- Mentor Layout -->
            <div id="mentorFields" style="display: none">
              <h5 class="mb-3" style="color: #1a5e4f">
                Professional Experience
              </h5>
              <div class="flex-column">
                <label for="organization">Organization / Company</label>
              </div>
              <div class="inputForm">
                <input
                  type="text"
                  class="input"
                  id="organization"
                  placeholder="e.g. Google, Safaricom"
                />
              </div>
              <div class="flex-column">
                <label for="expertise">Area of Expertise</label>
              </div>
              <div class="inputForm">
                <input
                  type="text"
                  class="input"
                  id="expertise"
                  placeholder="e.g. Full Stack Dev, AI Ethics"
                />
              </div>
              <div class="flex-column">
                <label for="motivation">Why do you want to be a mentor?</label>
              </div>
              <div class="inputForm" style="height: auto">
                <textarea
                  class="input py-2"
                  id="motivation"
                  rows="2"
                  placeholder="Tell us about your drive to help innovators"
                ></textarea>
              </div>
            </div>

            <div class="flex-row mt-3">
              <div style="display: flex; align-items: start; gap: 10px">
                <input
                  type="checkbox"
                  id="agreeTerms"
                  required
                  style="margin-top: 4px"
                />
                <label for="agreeTerms"
                  >I agree to the
                  <a href="#" class="span">Terms and Conditions</a></label
                >
              </div>
            </div>

            <div class="step-buttons" style="display: flex; gap: 10px">
              <button
                type="button"
                class="button-submit btn-prev"
                onclick="prevStep(3)"
              >
                Previous
              </button>
              <button
                type="submit"
                class="button-submit"
                onclick="handleSignup(event)"
              >
                Submit Registration
              </button>
            </div>
          </div>
        </form>

        <script>
          // Check for URL parameters to pre-fill form
          document.addEventListener("DOMContentLoaded", function () {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get("email");
            const name = urlParams.get("name");

            if (email) {
              document.getElementById("email").value = email;
            }
            if (name) {
              document.getElementById("fullName").value = name;
            }
          });
        </script>

    <!-- Signup Page JavaScript — Supabase Auth -->
    <script>
      // Note: We're not using type="module" here because we rely on global window definitions
      // and want to avoid deferral race conditions for onclick handlers.
      
      let currentStep = 1;

      // Better error message handler that targets the current step
      window.showErrorMessage = function (msg) {
        const existing = document.getElementById('signupErrorMsg');
        if (existing) existing.remove();
        const div = document.createElement('div');
        div.id = 'signupErrorMsg';
        div.className = 'alert alert-danger mt-2 py-2 small';
        div.textContent = msg;
        // Insert before buttons in current step
        const activeStep = document.querySelector('.form-step.active');
        if (activeStep) activeStep.appendChild(div);
        else alert(msg);
      };

      window.showSuccessMessage = function (msg) {
        console.log('Signup success:', msg);
      };

      // Role-based step 3 field toggle
      window.toggleStep3Layout = function () {
        const roleSelection = document.getElementById("role");
        if (!roleSelection) return;
        const role = roleSelection.value;
        const iFields = document.getElementById("innovatorFields");
        const mFields = document.getElementById("mentorFields");
        if (iFields) iFields.style.display = (role === "innovator" ? "block" : "none");
        if (mFields) mFields.style.display = (role === "mentor" ? "block" : "none");
      };

      window.nextStep = function (step) {
        if (validateStep(step)) {
          const sCurr = document.getElementById(`step${step}`);
          const iCurr = document.getElementById(`stepIndicator${step}`);
          if (sCurr) sCurr.classList.remove("active");
          if (iCurr) {
            iCurr.classList.add("completed");
            iCurr.classList.remove("active");
          }
          currentStep = step + 1;
          const sNext = document.getElementById(`step${currentStep}`);
          const iNext = document.getElementById(`stepIndicator${currentStep}`);
          if (sNext) sNext.classList.add("active");
          if (iNext) iNext.classList.add("active");
        }
      };

      window.prevStep = function (step) {
        const sCurr = document.getElementById(`step${step}`);
        const iCurr = document.getElementById(`stepIndicator${step}`);
        if (sCurr) sCurr.classList.remove("active");
        if (iCurr) iCurr.classList.remove("active");

        currentStep = step - 1;
        const sPrev = document.getElementById(`step${currentStep}`);
        const iPrev = document.getElementById(`stepIndicator${currentStep}`);
        if (sPrev) sPrev.classList.add("active");
        if (iPrev) {
          iPrev.classList.remove("completed");
          iPrev.classList.add("active");
        }
      };

      function validateStep(step) {
        const stepDiv = document.getElementById(`step${step}`);
        if (!stepDiv) return true;
        const inputs = stepDiv.querySelectorAll("input[required], select[required]");
        let isValid = true;
        inputs.forEach((input) => {
          if (!input.checkValidity()) { input.reportValidity(); isValid = false; }
        });
        if (step === 1 && isValid) {
          const pw = document.getElementById("password").value;
          const cpw = document.getElementById("confirmPassword").value;
          if (pw !== cpw) { showErrorMessage("Passwords do not match."); isValid = false; }
        }
        return isValid;
      }
      // Google OAuth Signup — redirect-based via Supabase
      window.handleGoogleSignIn = async function () {
        if (window.location.protocol === "file:") {
          showErrorMessage("Google sign-in requires a web server (not file://).");
          return;
        }
        try {
          // Redirect back to signup page to finish profile if needed
          const { error } = await window.supabase.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin + '/signup.html?google=success' }
          });
          if (error) throw error;
        } catch (error) {
          console.error("Google Sign-In Error:", error);
          showErrorMessage("Google authentication failed: " + error.message);
        }
      };

      // --- Core Platform Services ---
    </script>
    <script src="assets/js/utils/ui-utils.js?v=300.0.0"></script>
    <script src="assets/js/core/supabase-service.js?v=300.0.0" type="module"></script>

    <script type="module">
      import authManager from './assets/js/core/auth-manager.js';

      // Check for Google redirect or already logged in on load
      window.addEventListener("load", async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const container = document.getElementById("signupContainer");
        const loader = document.getElementById("signupLoading");

        // Initialize AuthManager
        await authManager.init();
        const user = authManager.getCurrentUser();

        if (user) {
            try {
                // Check if profile is already complete via centralized logic
                if (authManager.isProfileComplete()) {
                    console.log("Profile complete, redirecting to dashboard...");
                    
                    // Redirect based on role (admins to admin-dashboard, others to index)
                    if (user.role?.toLowerCase() === 'admin') {
                        window.location.href = "admin-dashboard.html";
                    } else {
                        window.location.href = "index.html";
                    }
                    return;
                }

                // Profile incomplete (Step 2/3 required)
                console.log("Profile incomplete (Step 2/3 required)");
                
                // Pre-fill fields
                if (user.email) document.getElementById("email").value = user.email;
                if (user.fullName || user.displayName) {
                    document.getElementById("fullName").value = user.fullName || user.displayName;
                }
                
                // Show Step 2
                document.getElementById("stepIndicator1").classList.add("completed");
                document.getElementById("stepIndicator1").classList.remove("active");
                document.getElementById("step1").classList.remove("active");
                document.getElementById("step2").classList.add("active");
                document.getElementById("stepIndicator2").classList.add("active");
                window.currentStep = 2; // Using global currentStep if defined
                if (typeof toggleStep3Layout === 'function') toggleStep3Layout();

                if (container) container.classList.add("ready");
                if (loader) loader.style.display = "none";
            } catch (err) {
                console.error("Session check error:", err);
                if (container) container.classList.add("ready");
                if (loader) loader.style.display = "none";
            }
        } else {
            // Not logged in, show Step 1
            if (container) container.classList.add("ready");
            if (loader) loader.style.display = "none";
        }
      });

      // Phone auth removed — Firebase-specific feature
      window.showPhoneAuth = function () {
        showErrorMessage("Phone sign-in is not available. Please use email or Google.");
      };

      // Main signup handler
      window.handleSignup = async function (event) {
        if (!validateStep(3)) return;

        const email        = document.getElementById("email").value.trim();
        const password     = document.getElementById("password").value;
        const fullName     = document.getElementById("fullName").value.trim();
        const role         = document.getElementById("role").value;
        const phone        = document.getElementById("phone").value.trim();
        const organization = document.getElementById("organization").value.trim();
        const expertise    = document.getElementById("expertise").value.trim();
        const motivation   = document.getElementById("motivation").value.trim();

        const btn = document.querySelector("#step3 .button-submit:last-child");
        const originalText = btn ? btn.innerHTML : "Submit";
        if (btn) { btn.innerHTML = '<i class="fa fa-spinner fa-spin me-2"></i> Registering...'; btn.disabled = true; }
        try {
          const status = role === "mentor" ? "pending" : "active";
          const { data: { session } } = await window.supabase.auth.getSession();
          let userId = session?.user?.id;

          if (!session) {
            // 1. Create Supabase Auth user (New Email User)
            const { data: authData, error: authError } = await window.supabase.auth.signUp({
              email,
              password,
              options: {
                data: {
                  full_name: fullName,
                  role:      role,
                  status:    status
                }
              }
            });
            if (authError) throw authError;
            userId = authData.user?.id;
          } else {
            // 1b. Update Auth metadata for existing user (e.g., Google user completing profile)
            await window.supabase.auth.updateUser({
                data: {
                    full_name: fullName,
                    role:      role,
                    status:    status
                }
            });
            // For existing session, userId is already from session.user.id
          }

          if (!userId) throw new Error("Could not determine User ID.");

          // 2. Upsert profile row (Ensures role is saved to profiles table)
          const profileData = {
            id:               userId,
            email:            email,
            full_name:        fullName,
            role:             role,
            phone:            phone,
            status:           status,
            profile_complete: true, // Mark as officially complete
            updated_at:       new Date().toISOString()
          };
          if (role === "mentor") {
            profileData.organization = organization;
            profileData.expertise    = expertise;
            profileData.motivation   = motivation;
          }

          if (window.SupabaseService) {
            await window.SupabaseService.upsertProfile(profileData);
            console.log("Profile persisted successfully ✓");
          }

          // 3. Store session locally
          localStorage.setItem("innovateHubUser", JSON.stringify({ ...profileData, uid: userId }));
          localStorage.setItem("justLoggedIn", "true");

          const welcomeMsg = role === "mentor"
            ? "Application submitted! Pending admin approval."
            : "Registration complete! Redirecting to your dashboard...";
          
          alert(welcomeMsg);
          window.location.href = "index.html";
        } catch (error) {
          console.error("Signup error:", error);
          if (error.message?.includes('already registered')) {
            showErrorMessage("An account with this email already exists.");
          } else {
            showErrorMessage("Signup failed: " + error.message);
          }
          if (btn) { btn.innerHTML = originalText; btn.disabled = false; }
        }
      };
    </script>
