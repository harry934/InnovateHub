<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <!-- Page Title -->
    <title>Sign Up - Innovate Hub</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="innovation, signup, student platform, registration" name="keywords">
    <meta content="Create an account on Innovate Hub to start your innovation journey" name="description">

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@600;700&family=Open+Sans&display=swap"
        rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="lib/animate/animate.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet">
    
    <!-- Innovate Hub Custom Styles -->
    <link href="css/innovate-hub.css" rel="stylesheet">
    
    <!-- Page-specific styles -->
    <style>
        /* Sign Up Page Specific Styles */
        
        /* Full-height container */
        .signup-container {
            min-height: 100vh;
            background: var(--bs-light);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        /* Signup card - white box containing the form */
        .signup-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 3rem;
            animation: fadeInUp 0.6s ease;
            margin: 2rem 0;
        }
        
        /* Logo section at top of card */
        .signup-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .signup-logo i {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 1rem;
        }
        
        .signup-logo h2 {
            color: #2c3e50;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .signup-logo p {
            color: #6c757d;
            font-size: 0.9rem;
        }
        
        /* Form group spacing */
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        /* Form labels */
        .form-group label {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 0.5rem;
            display: block;
        }
        
        /* Form inputs */
        .form-control,
        .form-select {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }
        
        /* Input focus state */
        .form-control:focus,
        .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        /* Submit button */
        .btn-signup {
            width: 100%;
            padding: 0.75rem;
            background: var(--bs-primary);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        
        .btn-signup:hover {
            background: var(--bs-dark);
            transform: translateY(-2px);
        }
        
        /* Password strength indicator */
        .password-strength {
            height: 4px;
            background: #e9ecef;
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
        }
        
        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
        }
        
        .password-strength-bar.weak {
            width: 33%;
            background: #dc3545;
        }
        
        .password-strength-bar.medium {
            width: 66%;
            background: #ffc107;
        }
        
        .password-strength-bar.strong {
            width: 100%;
            background: #198754;
        }
        
        /* Divider between form and links */
        .signup-divider {
            text-align: center;
            margin: 2rem 0;
            color: #6c757d;
        }
        
        /* Links section */
        .signup-links {
            text-align: center;
        }
        
        .signup-links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .signup-links a:hover {
            text-decoration: underline;
        }
        
        /* Back to home link */
        .back-home {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: white;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }
        
        .back-home:hover {
            color: white;
            transform: translateX(-5px);
        }
        
        /* Terms and conditions text */
        .terms-text {
            font-size: 0.85rem;
            color: #6c757d;
        }
        
        /* Responsive adjustments */
        @media (max-width: 768px) {
            .signup-card {
                padding: 2rem;
            }
            
            .back-home {
                position: static;
                display: inline-flex;
                margin-bottom: 1rem;
            }
        }
    </style>
</head>

<body>
    <!-- Sign Up Page Container -->
    <div class="signup-container">
        <!-- Back to Home Link -->
        <a href="index.html" class="back-home">
            <i class="fa fa-arrow-left"></i>
            Back to Home
        </a>
        
        <!-- Signup Card -->
        <div class="signup-card">
            <!-- Logo and Title -->
            <div class="signup-logo">
                <i class="fa fa-lightbulb"></i>
                <h2>Join Innovate Hub</h2>
                <p>Start your innovation journey today</p>
            </div>
            
            <!-- Signup Form -->
            <!-- onsubmit: JavaScript function called when form is submitted -->
            <form id="signupForm" onsubmit="handleSignup(event); return false;">
                
                <!-- Full Name Input -->
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <!-- required: Field must be filled -->
                    <!-- minlength: Minimum number of characters -->
                    <input 
                        type="text" 
                        class="form-control" 
                        id="fullName" 
                        placeholder="Enter your full name"
                        required
                        minlength="3">
                </div>
                
                <!-- Email Input -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <!-- type="email": Validates email format automatically -->
                    <input 
                        type="email" 
                        class="form-control" 
                        id="email" 
                        placeholder="Enter your email"
                        required>
                </div>
                
                <!-- Password Input -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <!-- oninput: Called every time user types a character -->
                    <!-- checkPasswordStrength: Function to check password quality -->
                    <input 
                        type="password" 
                        class="form-control" 
                        id="password" 
                        placeholder="Create a strong password"
                        required
                        minlength="6"
                        oninput="checkPasswordStrength()">
                    <!-- Password strength indicator bar -->
                    <div class="password-strength">
                        <div class="password-strength-bar" id="strengthBar"></div>
                    </div>
                    <small class="text-muted">Minimum 6 characters</small>
                </div>
                
                <!-- Confirm Password Input -->
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input 
                        type="password" 
                        class="form-control" 
                        id="confirmPassword" 
                        placeholder="Re-enter your password"
                        required>
                </div>
                

                
                <!-- Terms and Conditions Checkbox -->
                <div class="form-group">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                        <label class="form-check-label terms-text" for="agreeTerms">
                            I agree to the <a href="#" class="text-decoration-none">Terms and Conditions</a> 
                            and <a href="#" class="text-decoration-none">Privacy Policy</a>
                        </label>
                    </div>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" class="btn btn-signup">
                    Create Account
                </button>
            </form>
            
            <!-- Divider -->
            <div class="signup-divider">
                <span>Already have an account?</span>
            </div>
            
            <!-- Login Link -->
            <div class="signup-links">
                <a href="login.html">Login to your account</a>
            </div>
        </div>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Innovate Hub JavaScript -->
    <script src="js/api.js"></script>
    <script src="js/innovate-hub.js"></script>
    
    <!-- Signup Page JavaScript -->
    <script>
        /**
         * Check password strength and update visual indicator
         * Called every time user types in password field
         */
        function checkPasswordStrength() {
            // Get password value
            const password = document.getElementById('password').value;
            // Get strength bar element
            const strengthBar = document.getElementById('strengthBar');
            
            // Remove all strength classes
            strengthBar.classList.remove('weak', 'medium', 'strong');
            
            // Calculate password strength
            let strength = 0;
            
            // Check password length
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            
            // Check for numbers
            if (/\d/.test(password)) strength++;
            
            // Check for uppercase letters
            if (/[A-Z]/.test(password)) strength++;
            
            // Check for special characters
            if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength++;
            
            // Apply appropriate class based on strength
            if (strength <= 2) {
                strengthBar.classList.add('weak');
            } else if (strength <= 4) {
                strengthBar.classList.add('medium');
            } else {
                strengthBar.classList.add('strong');
            }
        }
        
        /**
         * Handle signup form submission
         * This function is called when user clicks "Create Account"
         * @param {Event} event - Form submission event
         */
        function handleSignup(event) {
            // Prevent default form submission
            event.preventDefault();
            
            // Get form values
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const agreeTerms = document.getElementById('agreeTerms').checked;
            
            // Validate all fields are filled
            if (!fullName || !email || !password || !confirmPassword) {
                showErrorMessage('Please fill in all fields');
                return;
            }
            
            // Validate email format
            if (!validateEmail(email)) {
                showErrorMessage('Please enter a valid email address');
                return;
            }
            
            // Check if passwords match
            if (password !== confirmPassword) {
                showErrorMessage('Passwords do not match');
                return;
            }
            
            // Check password length
            if (password.length < 6) {
                showErrorMessage('Password must be at least 6 characters long');
                return;
            }
            
            // Check if terms are agreed
            if (!agreeTerms) {
                showErrorMessage('Please agree to the Terms and Conditions');
                return;
            }
            
            // SIMULATED REGISTRATION
            // In a real application, this would send data to a server
            
            // Create user object
            const userData = {
                fullName: fullName,
                email: email,
                role: 'innovator', // Default role for all signups
                registrationDate: new Date().toISOString()
            };
            
            // Save to localStorage (simulating database)
            // In real app, this would be saved on server
            saveToLocalStorage('innovateHubRegistration', userData);
            
            // Show success message
            showSuccessMessage('Account created successfully! Redirecting to login...');
            
            // Redirect to homepage immediately (auto-login is handled there)
            setTimeout(function() {
                window.location.href = 'index.html';
            }, 1500);
        }
    </script>
</body>

</html>
