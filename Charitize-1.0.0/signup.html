<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sign Up - Innovate Hub</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta
      content="innovation, signup, student platform, registration"
      name="keywords"
    />
    <meta
      content="Create an account on Innovate Hub to start your innovation journey"
      name="description"
    />

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon" />

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@600;700&family=Open+Sans&display=swap"
      rel="stylesheet"
    />

    <!-- Icon Font Stylesheet -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Libraries Stylesheet -->
    <link href="lib/animate/animate.min.css" rel="stylesheet" />

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet" />

    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet" />

    <!-- Innovate Hub Custom Styles -->
    <link href="css/innovate-hub.css" rel="stylesheet" />

    <!-- Page-specific styles -->
    <style>
      /* Sign Up Page Specific Styles - Stepper Implementation */

      .signup-container {
        min-height: 100vh;
        background: #f8f9fa;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .signup-card {
        background: white;
        border-radius: 0;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        max-width: 600px;
        width: 100%;
        padding: 3rem;
        animation: fadeInUp 0.6s ease;
        position: relative;
        border: 1px solid #eee;
      }

      /* Stepper Visuals */
      .stepper-wrapper {
        display: flex;
        justify-content: space-between;
        margin-bottom: 3rem;
        position: relative;
      }

      .stepper-wrapper::before {
        content: "";
        position: absolute;
        top: 20px;
        left: 0;
        width: 100%;
        height: 2px;
        background: #e9ecef;
        z-index: 1;
      }

      .stepper-item {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 33.33%;
      }

      .step-counter {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #e9ecef;
        color: #6c757d;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        margin-bottom: 8px;
        transition: all 0.3s ease;
        border: 2px solid #fff;
      }

      .step-name {
        font-size: 0.8rem;
        font-weight: 600;
        color: #6c757d;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .stepper-item.active .step-counter {
        background: #1a5e4f;
        color: white;
      }

      .stepper-item.active .step-name {
        color: #1a5e4f;
      }

      .stepper-item.completed .step-counter {
        background: #f3a813;
        color: black;
      }

      /* Form Steps */
      .form-step {
        display: none;
        animation: fadeIn 0.4s ease;
      }

      .form-step.active {
        display: block;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-group label {
        font-weight: 600;
        color: #2c3e50;
        margin-bottom: 0.5rem;
        display: block;
      }

      .form-control,
      .form-select {
        border-radius: 0;
        border: 2px solid #e9ecef;
        padding: 0.75rem 1rem;
      }

      .form-control:focus,
      .form-select:focus {
        border-color: #1a5e4f;
        box-shadow: none;
      }

      /* Navigation Buttons */
      .step-buttons {
        display: flex;
        justify-content: space-between;
        margin-top: 2rem;
        gap: 1rem;
      }

      .btn-step {
        padding: 0.75rem 2rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        border-radius: 0;
        transition: all 0.3s ease;
      }

      .btn-next {
        background: #f3a813;
        color: black;
        border: none;
        flex-grow: 1;
      }

      .btn-prev {
        background: #e9ecef;
        color: #495057;
        border: none;
      }

      .btn-next:hover {
        background: #d99611;
      }

      .btn-prev:hover {
        background: #dee2e6;
      }

      .signup-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .back-home {
        position: absolute;
        top: 1rem;
        left: 1rem;
        color: #1a5e4f;
        text-decoration: none;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.3s ease;
        z-index: 10;
      }

      /* Social Auth Buttons */
      .social-auth {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin-bottom: 2rem;
      }

      .btn-social {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 0.75rem;
        border: 2px solid #e9ecef;
        background: white;
        color: #495057;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      .btn-social:hover {
        background: #f8f9fa;
        border-color: #dee2e6;
      }

      .btn-google img {
        width: 20px;
      }

      .divider-text {
        display: flex;
        align-items: center;
        text-align: center;
        margin-bottom: 2rem;
        color: #6c757d;
        font-size: 0.85rem;
      }

      .divider-text::before,
      .divider-text::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid #e9ecef;
      }

      .divider-text:not(:empty)::before {
        margin-right: 1rem;
      }

      .divider-text:not(:empty)::after {
        margin-left: 1rem;
      }

      .otp-section {
        display: none;
        margin-top: 1rem;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <!-- Logo Preloader Start -->
    <div id="logo-preloader">
      <div class="preloader-content">
        <svg
          class="preloader-logo-svg"
          viewBox="0 0 40 40"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            class="hexagon-path"
            d="M20 4L33.8564 12V28L20 36L6.14359 28V12L20 4Z"
            stroke="white"
            stroke-width="2.5"
            stroke-linejoin="round"
          />
          <circle class="hub-circle" cx="20" cy="20" r="5" fill="#F3A813" />
          <line
            class="connect-line line-1"
            x1="20"
            y1="4"
            x2="20"
            y2="15"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
          />
          <line
            class="connect-line line-2"
            x1="33.8564"
            y1="28"
            x2="24.3301"
            y2="22.5"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
          />
          <line
            class="connect-line line-3"
            x1="6.14359"
            y1="28"
            x2="15.6699"
            y2="22.5"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
          />
        </svg>
      </div>
    </div>
    <!-- Logo Preloader End -->

    <!-- Sign Up Page Container -->
    <div class="signup-container">
      <!-- Back to Home Link (Top Left) -->
      <a href="/" class="back-home">
        <i class="fa fa-arrow-left"></i>
        Back to Home
      </a>

      <!-- Signup Card (Centered) -->
      <div class="signup-card">
        <!-- Stepper Progress -->
        <div class="stepper-wrapper">
          <div class="stepper-item active" id="stepIndicator1">
            <div class="step-counter">1</div>
            <div class="step-name">Account</div>
          </div>
          <div class="stepper-item" id="stepIndicator2">
            <div class="step-counter">2</div>
            <div class="step-name">Profile</div>
          </div>
          <div class="stepper-item" id="stepIndicator3">
            <div class="step-counter">3</div>
            <div class="step-name">Project</div>
          </div>
        </div>

        <!-- Signup Form -->
        <form id="signupForm" onsubmit="return false;">
          <!-- Step 1: Account Information -->
          <div class="form-step active" id="step1">
            <div class="social-auth">
              <button
                type="button"
                class="btn btn-social btn-google"
                onclick="handleGoogleSignIn()"
              >
                <img
                  src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                  alt="Google"
                />
                Continue with Google
              </button>
              <button
                type="button"
                class="btn btn-social btn-phone"
                onclick="showPhoneAuth()"
              >
                <i class="fa fa-phone text-success"></i>
                Continue with Phone
              </button>
            </div>

            <div class="divider-text">OR EMAIL</div>

            <div class="form-group">
              <label for="email">Email Address</label>
              <input
                type="email"
                class="form-control"
                id="email"
                placeholder="email@example.com"
                required
              />
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                class="form-control"
                id="password"
                placeholder="Create a strong password"
                required
                minlength="6"
              />
            </div>
            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input
                type="password"
                class="form-control"
                id="confirmPassword"
                placeholder="Repeat password"
                required
              />
            </div>
            <div class="step-buttons">
              <button
                type="button"
                class="btn btn-step btn-next"
                onclick="nextStep(1)"
              >
                Next Step
              </button>
            </div>
          </div>

          <!-- Step 2: Personal & Professional Profile -->
          <div class="form-step" id="step2">
            <div class="form-group">
              <label for="fullName">Full Name</label>
              <input
                type="text"
                class="form-control"
                id="fullName"
                placeholder="Enter your full name"
                required
              />
            </div>
            <div class="form-group">
              <label for="phone">Phone Number</label>
              <input
                type="tel"
                class="form-control"
                id="phone"
                placeholder="+254 7XX XXX XXX"
                required
              />
            </div>
            <div class="form-group">
              <label for="role">Primary Role</label>
              <select
                class="form-control"
                id="role"
                required
                onchange="toggleStep3Layout()"
              >
                <option value="" disabled selected>Select your role</option>
                <option value="innovator">Student Innovator</option>
                <option value="mentor">Professional Mentor</option>
              </select>
            </div>
            <div class="step-buttons">
              <button
                type="button"
                class="btn btn-step btn-prev"
                onclick="prevStep(2)"
              >
                Previous
              </button>
              <button
                type="button"
                class="btn btn-step btn-next"
                onclick="nextStep(2)"
              >
                Next Step
              </button>
            </div>
          </div>

          <!-- Step 3: Role Specific Details -->
          <div class="form-step" id="step3">
            <!-- Innovator Layout -->
            <div id="innovatorFields" style="display: none">
              <h5 class="mb-3 text-primary">Project Details (Optional)</h5>
              <div class="form-group">
                <label for="targetArea">Innovation Focus Area</label>
                <select class="form-control" id="targetArea">
                  <option value="" disabled selected>Select area</option>
                  <option value="agritech">Agricultural Technology</option>
                  <option value="robotics">Robotics & Automation</option>
                  <option value="ai">Artificial Intelligence</option>
                  <option value="digital">Digital Transformation</option>
                </select>
              </div>
              <div class="form-group">
                <label for="projectTitle">Project Working Title</label>
                <input
                  type="text"
                  class="form-control"
                  id="projectTitle"
                  placeholder="e.g. Smart Irrigation System"
                />
              </div>
            </div>

            <!-- Mentor Layout (From previous mentor-signup.html logic) -->
            <div id="mentorFields" style="display: none">
              <h5 class="mb-3 text-primary">Professional Experience</h5>
              <div class="form-group">
                <label for="organization">Organization / Company</label>
                <input
                  type="text"
                  class="form-control"
                  id="organization"
                  placeholder="e.g. Google, Safaricom"
                />
              </div>
              <div class="form-group">
                <label for="expertise">Area of Expertise</label>
                <input
                  type="text"
                  class="form-control"
                  id="expertise"
                  placeholder="e.g. Full Stack Dev, AI Ethics"
                />
              </div>
              <div class="form-group">
                <label for="motivation">Why do you want to be a mentor?</label>
                <textarea
                  class="form-control"
                  id="motivation"
                  rows="2"
                  placeholder="Tell us about your drive to help innovators"
                ></textarea>
              </div>
            </div>

            <div class="form-group">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="agreeTerms"
                  required
                />
                <label class="form-check-label terms-text" for="agreeTerms">
                  I agree to the
                  <a href="#" class="text-decoration-none"
                    >Terms and Conditions</a
                  >
                </label>
              </div>
            </div>

            <div class="step-buttons">
              <button
                type="button"
                class="btn btn-step btn-prev"
                onclick="prevStep(3)"
              >
                Previous
              </button>
              <button
                type="submit"
                class="btn btn-step btn-next"
                onclick="handleSignup(event)"
              >
                Submit Registration
              </button>
            </div>
          </div>
        </form>

        <script>
          // Check for URL parameters to pre-fill form
          document.addEventListener("DOMContentLoaded", function () {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get("email");
            const name = urlParams.get("name");

            if (email) {
              document.getElementById("email").value = email;
            }
            if (name) {
              document.getElementById("fullName").value = name;
            }
          });
        </script>

        <!-- reCAPTCHA Container for Phone Auth -->
        <div id="recaptcha-container"></div>

        <!-- Divider -->
        <div
          class="signup-divider"
          style="text-align: center; margin: 2rem 0; color: #6c757d"
        >
          <span>Already have an account?</span>
        </div>

        <!-- Login Link -->
        <div class="signup-links" style="text-align: center">
          <a
            href="login.html"
            style="color: #1a5e4f; text-decoration: none; font-weight: 600"
            >Login to your account</a
          >
        </div>
      </div>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Innovate Hub JavaScript -->
    <script src="js/ui-utils.js?v=1.0.1"></script>
    <script src="js/api.js?v=1.0.1"></script>
    <script type="module" src="js/innovate-hub.js?v=1.0.1"></script>

    <!-- Signup Page JavaScript -->
    <script type="module">
      import { auth, db, googleProvider } from './js/firebase-config.js';
      import {
          createUserWithEmailAndPassword,
          signInWithPopup,
          signInWithPhoneNumber,
          RecaptchaVerifier
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
      import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      let currentStep = 1;
      let confirmationResult = null;

      // Check for role or Google redirect on load
      window.addEventListener('load', async () => {
          const urlParams = new URLSearchParams(window.location.search);
          if (urlParams.get('google') === 'true') {
              // Auto-trigger Google sign-in to get user details
              handleGoogleSignIn();
          }
      });

      // Role-based dynamics
      window.toggleStep3Layout = function() {
          const role = document.getElementById('role').value;
          const innovatorFields = document.getElementById('innovatorFields');
          const mentorFields = document.getElementById('mentorFields');

          if (role === 'innovator') {
              innovatorFields.style.display = 'block';
              mentorFields.style.display = 'none';
          } else if (role === 'mentor') {
              mentorFields.style.display = 'block';
              innovatorFields.style.display = 'none';
          }
      }


      /**
       * Handle signup form submission
       * This function is called when user clicks "Create Account"
       * @param {Event} event - Form submission event
       */
      window.nextStep = function(step) {
          if (validateStep(step)) {
              document.getElementById(`step${step}`).classList.remove('active');
              document.getElementById(`stepIndicator${step}`).classList.add('completed');
              document.getElementById(`stepIndicator${step}`).classList.remove('active');

              currentStep = step + 1;
              document.getElementById(`step${currentStep}`).classList.add('active');
              document.getElementById(`stepIndicator${currentStep}`).classList.add('active');
          }
      }

      window.prevStep = function(step) {
          document.getElementById(`step${step}`).classList.remove('active');
          document.getElementById(`stepIndicator${step}`).classList.remove('active');

          currentStep = step - 1;
          document.getElementById(`step${currentStep}`).classList.add('active');
          document.getElementById(`stepIndicator${currentStep}`).classList.remove('completed');
          document.getElementById(`stepIndicator${currentStep}`).classList.add('active');
      }

      function validateStep(step) {
          const currentStepDiv = document.getElementById(`step${step}`);
          const inputs = currentStepDiv.querySelectorAll('input, select');
          let isValid = true;

          inputs.forEach(input => {
              if (!input.checkValidity()) {
                  input.reportValidity();
                  isValid = false;
              }
          });

          if (step === 1) {
              const password = document.getElementById('password').value;
              const confirm = document.getElementById('confirmPassword').value;
              if (password !== confirm) {
                  showErrorMessage('Passwords do not match');
                  isValid = false;
              }
          }

          return isValid;
      }

      window.handleGoogleSignIn = async function() {
          if (window.location.protocol === 'file:') {
              window.showErrorMessage("Social login requires a web server (localhost or domain). Please run using a local server (e.g., Live Server).");
              return;
          }
          try {
              const result = await signInWithPopup(auth, googleProvider);
              const user = result.user;

              // Fetch profile - if exists, it's a login attempt on signup page
              const userDoc = await getDoc(doc(db, "users", user.uid));
              if (userDoc.exists()) {
                  await auth.signOut();
                  window.showErrorMessage("Email already exists. Please proceed to login.");
              } else {
                  // Pre-fill Step 2
                  document.getElementById('email').value = user.email || "";
                  document.getElementById('fullName').value = user.displayName || "";
                  window.nextStep(1);
              }
          } catch (error) {
              console.error("Google Sign-In Error:", error);
              window.showErrorMessage("Google authentication failed: " + error.message);
          }
      }

      window.showPhoneAuth = function() {
          if (window.location.protocol === 'file:') {
              window.showErrorMessage("Phone auth requires a web server. Please run using a local server.");
              return;
          }
          const phoneNumber = prompt("Enter your phone number (with country code, e.g., +254...):");
          if (!phoneNumber) return;

          try {
              setupRecaptcha();
              const appVerifier = window.recaptchaVerifier;

              signInWithPhoneNumber(auth, phoneNumber, appVerifier)
                  .then((result) => {
                      confirmationResult = result;
                      const code = prompt("Enter the 6-digit verification code sent to your phone:");
                      if (code) {
                          return confirmationResult.confirm(code);
                      }
                  })
                  .then((result) => {
                      if (result) {
                          const user = result.user;
                          window.nextStep(1); // Proceed to profile step
                      }
                  })
                  .catch((error) => {
                      console.error("Phone Auth Error:", error);
                      window.showErrorMessage("Phone verification failed: " + error.message);
                  });
          } catch (err) {
              console.error("Recaptcha Setup Error:", err);
              window.showErrorMessage("Verification setup failed: " + err.message);
          }
      }

      function setupRecaptcha() {
          if (!window.recaptchaVerifier) {
              window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                  'size': 'invisible'
              });
          }
      }

      window.handleSignup = async function(event) {
          if (validateStep(3)) {
              const email = document.getElementById('email').value;
              const password = document.getElementById('password').value || 'SOCIAL_AUTH';
              const fullName = document.getElementById('fullName').value;
              const role = document.getElementById('role').value;
              const phone = document.getElementById('phone').value;

              // Specific data
              const area = document.getElementById('targetArea').value;
              const project = document.getElementById('projectTitle').value;
              const organization = document.getElementById('organization').value;
              const expertise = document.getElementById('expertise').value;
              const motivation = document.getElementById('motivation').value;

              // Show loading state
              const btn = (event && event.submitter) || document.querySelector('#step3 .btn-next');
              const originalText = btn ? btn.innerHTML : "Submit";
              if (btn) {
                  btn.innerHTML = '<i class="fa fa-spinner fa-spin me-2"></i> Registering...';
                  btn.disabled = true;
              }

              try {
                  let user = auth.currentUser;

                  // If not already authenticated via Social/Phone
                  if (!user) {
                      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                      user = userCredential.user;
                  }

                  // Determine status
                  const status = role === 'mentor' ? 'pending_approval' : 'active';

                  // Save to Firestore (Frontend Legacy)
                  const profileData = {
                      uid: user.uid,
                      email: email,
                      fullName: fullName,
                      role: role,
                      phone: phone,
                      status: status,
                      createdAt: new Date().toISOString()
                  };

                  if (role === 'innovator') {
                      if (area) profileData.area = area;
                      if (project) profileData.project = project;
                  } else if (role === 'mentor') {
                      profileData.organization = organization;
                      profileData.expertise = expertise;
                      profileData.motivation = motivation;
                  }

                  await setDoc(doc(db, "users", user.uid), profileData);

                  // Set session and redirect
                  localStorage.setItem('innovateHubUser', JSON.stringify(profileData));
                  localStorage.setItem('justLoggedIn', 'true');

                  const welcomeMsg = role === 'mentor' ?
                      'Application submitted! Pending admin approval.' :
                      'Signup successful! Welcome to Innovate Hub.';

                  window.showSuccessMessage(welcomeMsg);

                  setTimeout(() => {
                      window.location.href = 'index.html';
                  }, 2000);

              } catch (error) {
                  console.error("Signup error:", error);

                  if (error.code === 'auth/email-already-in-use') {
                      window.showErrorMessage("Email already exists. Please proceed to login.");
                  } else {
                      window.showErrorMessage('Signup failed: ' + error.message);
                  }

                  btn.innerHTML = originalText;
                  btn.disabled = false;
              }
          }
      }
    </script>
  </body>
</html>
