    <!-- Page-specific styles -->
    <style>
      /* Full-height container */
      .signup-container {
        min-height: 100vh;
        background: var(--bs-light);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        position: relative;
      }

      .back-home {
        position: absolute;
        top: 1rem;
        left: 1rem;
        color: #1a5e4f;
        text-decoration: none;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.3s ease;
        z-index: 10;
      }

      .back-home:hover {
        color: #14493e;
        transform: translateX(-5px);
      }

      /* Uiverse.io Form Styles Adapted for Signup Card */
      .signup-card {
        display: flex;
        flex-direction: column;
        gap: 10px;
        background-color: #ffffff;
        padding: 40px;
        width: 100%;
        max-width: 550px;
        border-radius: 20px;
        font-family: 'Open Sans', sans-serif;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        animation: fadeInUp 0.6s ease;
        border: 1px solid #eee;
      }

      /* Stepper Visuals - Modernized */
      .stepper-wrapper {
        display: flex;
        justify-content: space-between;
        margin-bottom: 2rem;
        position: relative;
      }

      .stepper-wrapper::before {
        content: "";
        position: absolute;
        top: 18px;
        left: 0;
        width: 100%;
        height: 2px;
        background: #ecedec;
        z-index: 1;
      }

      .stepper-item {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 33.33%;
      }

      .step-counter {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: white;
        color: #6c757d;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        margin-bottom: 8px;
        transition: all 0.3s ease;
        border: 2px solid #ecedec;
      }

      .step-name {
        font-size: 0.75rem;
        font-weight: 600;
        color: #6c757d;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .stepper-item.active .step-counter {
        border-color: #2d79f3;
        color: #2d79f3;
      }

      .stepper-item.active .step-name {
        color: #2d79f3;
      }

      .stepper-item.completed .step-counter {
        background: #2d79f3;
        color: white;
        border-color: #2d79f3;
      }

      /* Form Elements from Uiverse */
      .flex-column > label {
        color: #151717;
        font-weight: 600;
        margin-bottom: 5px;
        display: block;
      }

      .inputForm {
        border: 1.5px solid #ecedec;
        border-radius: 10px;
        height: 50px;
        display: flex;
        align-items: center;
        padding-left: 10px;
        transition: 0.2s ease-in-out;
        margin-bottom: 15px;
      }

      .input {
        margin-left: 10px;
        border-radius: 10px;
        border: none;
        width: 85%;
        height: 100%;
        background: transparent;
      }

      .input:focus {
        outline: none;
      }

      .inputForm:focus-within {
        border: 1.5px solid #2d79f3;
      }

      /* Custom Step Content */
      .form-step {
        display: none;
        animation: fadeIn 0.4s ease;
      }

      .form-step.active {
        display: block;
      }

      .button-submit {
        margin: 10px 0;
        background-color: #1a5e4f; /* Using Brand Green */
        border: none;
        color: white;
        font-size: 15px;
        font-weight: 500;
        border-radius: 10px;
        height: 50px;
        width: 100%;
        cursor: pointer;
        transition: 0.3s;
      }

      .button-submit:hover {
        background-color: #14493e;
        transform: translateY(-2px);
      }

      .btn-prev {
        background-color: #f8f9fa;
        color: #495057;
        border: 1.5px solid #ecedec;
      }

      .btn-prev:hover {
        background-color: #e9ecef;
      }

      .social-auth {
        display: flex;
        gap: 10px;
        margin-bottom: 1.5rem;
      }

      .btn-social {
        flex: 1;
        height: 50px;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: 500;
        gap: 10px;
        border: 1px solid #ededef;
        background-color: white;
        cursor: pointer;
        transition: 0.2s ease-in-out;
      }

      .btn-social:hover {
        border: 1px solid #2d79f3;
        background-color: #f8f9fa;
      }

      .divider-text {
        text-align: center;
        margin: 20px 0;
        position: relative;
        color: #6c757d;
        font-size: 0.85rem;
      }

      .divider-text::before,
      .divider-text::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 35%;
        height: 1px;
        background: #ecedec;
      }

      .divider-text::before {
        left: 0;
      }
      .divider-text::after {
        right: 0;
      }

      .p {
        text-align: center;
        color: black;
        font-size: 14px;
        margin: 5px 0;
      }

      .span {
        font-size: 14px;
        margin-left: 5px;
        color: #2d79f3;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 768px) {
        .signup-container {
          padding: 1rem;
          align-items: flex-start;
          padding-top: 4rem;
        }
        .signup-card {
          width: 100%;
          padding: 20px;
          margin-bottom: 2rem;

          margin-bottom: 1.5rem;
        }
        .step-counter {
          width: 30px;
          height: 30px;
          font-size: 0.9rem;
        }

          font-size: 0.65rem;
        }
        .back-home {
          position: absolute;
          top: 1rem;
          left: 1rem;
          margin-bottom: 0;
        }
      }

    <!-- Mobile Hamburger Menu Enhancement Script -->
    <script>
    (function() {
        document.addEventListener('DOMContentLoaded', function() {
            var navCollapse = document.getElementById('navbarCollapse');
            var toggler = document.querySelector('.navbar-toggler');
            if (!navCollapse || !toggler) return;

            // Inject custom 3-bar icon into toggler
            if (!toggler.querySelector('.mob-icon')) {
                var icon = document.createElement('span');
                icon.className = 'mob-icon';
                icon.innerHTML = '<span></span><span></span><span></span>';
                toggler.appendChild(icon);
            }

            // Inject overlay div
            var overlay = document.getElementById('mobileNavOverlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'mobileNavOverlay';
                overlay.className = 'mobile-nav-overlay';
                document.body.appendChild(overlay);
            }

            // Bootstrap events
            navCollapse.addEventListener('show.bs.collapse', function() {
                document.body.classList.add('mob-menu-open');
                overlay.classList.add('active');
            });

            navCollapse.addEventListener('hide.bs.collapse', function() {
                document.body.classList.remove('mob-menu-open');
                overlay.classList.remove('active');
            });

            // Click overlay to close
            overlay.addEventListener('click', function() {
                var bsCollapse = bootstrap.Collapse.getInstance(navCollapse);
                if (bsCollapse) bsCollapse.hide();
                else new bootstrap.Collapse(navCollapse).hide();
            });
        });
    })();
    </script>

    <script type="module">

      // Global error/success handlers

          alert('Error: ' + msg);

      window.showSuccessMessage = function(msg) {
          console.log('Success: ' + msg);

      // Check for role or Google redirect on load
      window.addEventListener('load', async () => {
          const urlParams = new URLSearchParams(window.location.search);
          if (urlParams.get('google') === 'true') {
              // Auto-trigger Google sign-in to get user details
              handleGoogleSignIn();
          }
      });

      // Role-based dynamics
      window.toggleStep3Layout = function() {
          const role = document.getElementById('role').value;
          const innovatorFields = document.getElementById('innovatorFields');
          const mentorFields = document.getElementById('mentorFields');

          if (role === 'innovator') {
              innovatorFields.style.display = 'block';
              mentorFields.style.display = 'none';
          } else if (role === 'mentor') {
              mentorFields.style.display = 'block';
              innovatorFields.style.display = 'none';
          }
      }


      /**
       * Handle signup form submission
       * This function is called when user clicks "Create Account"
       * @param {Event} event - Form submission event
       */
      window.nextStep = function(step) {
          if (validateStep(step)) {
              document.getElementById(`step${step}`).classList.remove('active');
              document.getElementById(`stepIndicator${step}`).classList.add('completed');
              document.getElementById(`stepIndicator${step}`).classList.remove('active');

              currentStep = step + 1;
              document.getElementById(`step${currentStep}`).classList.add('active');
              document.getElementById(`stepIndicator${currentStep}`).classList.add('active');
          }
      }

      window.prevStep = function(step) {
          document.getElementById(`step${step}`).classList.remove('active');
          document.getElementById(`stepIndicator${step}`).classList.remove('active');

          currentStep = step - 1;
          document.getElementById(`step${currentStep}`).classList.add('active');
          document.getElementById(`stepIndicator${currentStep}`).classList.remove('completed');
          document.getElementById(`stepIndicator${currentStep}`).classList.add('active');
      }

      function validateStep(step) {
          const currentStepDiv = document.getElementById(`step${step}`);
          const inputs = currentStepDiv.querySelectorAll('input, select');
          let isValid = true;

          inputs.forEach(input => {
              if (!input.checkValidity()) {
                  input.reportValidity();
                  isValid = false;
              }
          });

          if (step === 1) {
              const password = document.getElementById('password').value;
              const confirm = document.getElementById('confirmPassword').value;
              if (password !== confirm) {
                  showErrorMessage('Passwords do not match');
                  isValid = false;
              }
          }

          return isValid;
      }

      window.handleGoogleSignIn = async function() {
          if (window.location.protocol === 'file:') {
              window.showErrorMessage("Social login requires a web server (localhost or domain). Please run using a local server (e.g., Live Server).");
              return;
          }
          try {
              const result = await signInWithPopup(auth, googleProvider);
              const user = result.user;

              // Fetch profile - if exists, it's a login attempt on signup page
              const userDoc = await getDoc(doc(db, "users", user.uid));
              if (userDoc.exists()) {
                  await auth.signOut();
                  window.showErrorMessage("Email already exists. Please proceed to login.");
              } else {
                  // Pre-fill Step 2
                  document.getElementById('email').value = user.email || "";
                  document.getElementById('fullName').value = user.displayName || "";
                  window.nextStep(1);
              }
          } catch (error) {
              console.error("Google Sign-In Error:", error);
              window.showErrorMessage("Google authentication failed: " + error.message);
          }
      }

      window.showPhoneAuth = function() {
          if (window.location.protocol === 'file:') {
              window.showErrorMessage("Phone auth requires a web server. Please run using a local server.");
              return;
          }
          const phoneNumber = prompt("Enter your phone number (with country code, e.g., +254...):");
          if (!phoneNumber) return;

          try {
              setupRecaptcha();
              const appVerifier = window.recaptchaVerifier;

              signInWithPhoneNumber(auth, phoneNumber, appVerifier)
                  .then((result) => {
                      confirmationResult = result;
                      const code = prompt("Enter the 6-digit verification code sent to your phone:");
                      if (code) {
                          return confirmationResult.confirm(code);
                      }
                  })
                  .then((result) => {
                      if (result) {
                          const user = result.user;
                          window.nextStep(1); // Proceed to profile step
                      }
                  })
                  .catch((error) => {
                      console.error("Phone Auth Error:", error);
                      window.showErrorMessage("Phone verification failed: " + error.message);
                  });
          } catch (err) {
              console.error("Recaptcha Setup Error:", err);
              window.showErrorMessage("Verification setup failed: " + err.message);
          }
      }

      function setupRecaptcha() {
          if (!window.recaptchaVerifier) {
              window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                  'size': 'invisible'
              });
          }
      }

      window.handleSignup = async function(event) {
          if (validateStep(3)) {
              const email = document.getElementById('email').value;
              const password = document.getElementById('password').value || 'SOCIAL_AUTH';
              const fullName = document.getElementById('fullName').value;
              const role = document.getElementById('role').value;
              const phone = document.getElementById('phone').value;

              // Specific data
              const area = document.getElementById('targetArea').value;
              const project = document.getElementById('projectTitle').value;
              const organization = document.getElementById('organization').value;
              const expertise = document.getElementById('expertise').value;
              const motivation = document.getElementById('motivation').value;

              // Show loading state
              const btn = (event && event.submitter) || document.querySelector('#step3 .button-submit');
              const originalText = btn ? btn.innerHTML : "Submit";
              if (btn) {
                  btn.innerHTML = '<i class="fa fa-spinner fa-spin me-2"></i> Registering...';
                  btn.disabled = true;
              }

              try {
                  let user = auth.currentUser;

                  // If not already authenticated via Social/Phone
                  if (!user) {
                      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                      user = userCredential.user;
                  }

                  // Determine status
                  const status = role === 'mentor' ? 'pending_approval' : 'active';

                  // Save to Firestore (Frontend Legacy)
                  const profileData = {
                      uid: user.uid,
                      email: email,
                      fullName: fullName,
                      role: role,
                      phone: phone,
                      status: status,
                      createdAt: new Date().toISOString()
                  };

                  if (role === 'innovator') {
                      if (area) profileData.area = area;
                      if (project) profileData.project = project;
                  } else if (role === 'mentor') {
                      profileData.organization = organization;
                      profileData.expertise = expertise;
                      profileData.motivation = motivation;
                  }

                  await setDoc(doc(db, "users", user.uid), profileData);

                  // Set session and redirect
                  localStorage.setItem('innovateHubUser', JSON.stringify(profileData));
                  localStorage.setItem('justLoggedIn', 'true');

                  const welcomeMsg = role === 'mentor' ?
                      'Application submitted! Pending admin approval.' :
                      'Signup successful! Welcome to Innovate Hub.';

                  window.showSuccessMessage(welcomeMsg);

                  setTimeout(() => {
                      window.location.href = 'index.html';
                  }, 2000);

              } catch (error) {
                  console.error("Signup error:", error);

                  if (error.code === 'auth/email-already-in-use') {
                      window.showErrorMessage("Email already exists. Please proceed to login.");
                  } else {
                      window.showErrorMessage('Signup failed: ' + error.message);
                  }

                  btn.innerHTML = originalText;
                  btn.disabled = false;
              }
          }
      }
    </script>
  </body>
</html>
